<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Tea Flavor Wheel Study Tool</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --primary-bg: #fdfbf7;
            --panel-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
            --border-color: #e8e6e1;
            
            /* Badges */
            --pro-color: #27ae60;
            --pro-bg: #eafaf1;
            --consumer-color: #2980b9;
            --consumer-bg: #ebf5fb;
            --tidbit-color: #d35400;
            --tidbit-bg: #fdf2e9;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-color: var(--primary-bg);
            color: var(--text-main);
        }

        #wheel-container {
            flex: 1.4;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: radial-gradient(circle, #ffffff 0%, #f4f1ea 100%);
        }

        svg {
            cursor: grab;
            filter: drop-shadow(0px 12px 28px rgba(0,0,0,0.08));
        }

        svg:active {
            cursor: grabbing;
        }

        path {
            cursor: pointer;
            stroke: #fff;
            stroke-width: 1px;
            transition: opacity 0.2s;
        }

        #info-panel {
            flex: 0.6;
            min-width: 400px;
            max-width: 500px;
            background-color: var(--panel-bg);
            border-left: 1px solid var(--border-color);
            padding: 40px 35px;
            box-shadow: -5px 0 25px rgba(0,0,0,0.03);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .level-badge {
            display: inline-flex;
            align-items: center;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.75em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 12px;
        }

        .badge-pro { background-color: var(--pro-bg); color: var(--pro-color); border: 1px solid #c8e6c9; }
        .badge-consumer { background-color: var(--consumer-bg); color: var(--consumer-color); border: 1px solid #bbdefb; }
        .badge-tidbit { background-color: var(--tidbit-bg); color: var(--tidbit-color); border: 1px solid #ffe0b2; }

        h1 { margin: 0 0 8px 0; font-size: 2.4em; color: #1a252f; font-family: 'Georgia', serif; }
        .category-subtitle { font-size: 0.9em; color: var(--text-muted); margin-bottom: 25px; padding-bottom: 15px; border-bottom: 2px solid var(--border-color); text-transform: uppercase; letter-spacing: 1px; }
        
        h2 { font-size: 1.05em; margin: 0 0 8px 0; color: #34495e; text-transform: uppercase; letter-spacing: 0.5px; }
        p { line-height: 1.6; margin-top: 0; color: #4b5563; font-size: 0.95em; }

        .card {
            background: #fff;
            padding: 22px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            border: 1px solid #f1f0ed;
        }

        .placeholder {
            text-align: center;
            color: #9ca3af;
            margin-top: 40%;
            transform: translateY(-50%);
        }
        
        .placeholder h2 { color: #6b7280; margin-top: 15px; }
    </style>
</head>

                        { name: "tobacco", color: "#e5e7e9", pro: "A complex, earthy, sweet, and slightly leathery note. Very common in aged raw Pu-erh and some Keemun blacks.", con: "A rich, sweet, and earthy aroma like unlit pipe tobacco or a cigar humidor.", tidbit: "As raw Pu-erh ages over decades, its sharp astringency mellows out into deep, complex tobacco and leather notes." },
                        { name: "grilled food", color: "#e5e7e9", pro: "Savory pyrazines combined with smoke phenols. Present in some heavy charcoal-roasted oolongs.", con: "A savory, slightly smoky umami flavor.", tidbit: "Traditional charcoal roasting requires a master roaster to monitor the ash continuously for days to prevent the tea from catching fire." },
                        { name: "burnt food", color: "#e5e7e9", pro: "A severe roasting defect where the leaf carbonizes, creating acrid, bitter flavors.", con: "An unpleasant, harsh bitterness like scraping the burnt bottom of a pan.", tidbit: "Carbonized tea leaves will feel brittle and powdery to the touch, a clear sign of poor processing." },
                        { name: "fireplace", color: "#e5e7e9", pro: "A mellow, integrated smoke and wood profile, typical of aged Lapsang Souchong.", con: "A comforting, woody, and gently smoky aroma like sitting by a winter hearth.", tidbit: "High-quality smoked teas balance the smoke so it doesn't overpower the natural floral and fruity notes of the tea leaf." }
                    ]
                },
                {
                    name: "VEGETAL", color: "#a9dfbf",
                    children: [
                        { name: "GRASS", color: "#d4efdf", children: [
                            { name: "grass", color: "#e9f7ef", pro: "Hexanal and leaf alcohol. The quintessential profile of steamed Japanese green teas.", con: "A fresh, bright, and slightly astringent green flavor.", tidbit: "Steaming tea leaves (Japanese style) immediately halts oxidation, preserving the vibrant green color and grassy flavors." },
                            { name: "freshly cut grass", color: "#e9f7ef", pro: "Intense, volatile cis-3-hexenol. A highly vibrant, almost pungent green note.", con: "The exact, vivid smell of a lawnmower on a summer day.", tidbit: "This compound is actually a distress signal released by the plant when its leaves are broken or cut." },
                            { name: "grass seed", color: "#e9f7ef", pro: "A slightly dry, starchy, and mild green note.", con: "A dry, earthy, and mild green flavor, similar to chewing on a wheat stalk.", tidbit: "Some lower-grade green teas have a flatter, seed-like profile due to later harvesting times." },
                            { name: "barnyard", color: "#e9f7ef", pro: "A funky, earthy, and slightly animalic note. Often a sign of humid storage or specific organic fertilizers.", con: "A rustic, funky, and earthy aroma reminiscent of hay and horses.", tidbit: "In the Pu-erh world, a slight 'barnyard' funk is sometimes appreciated as a sign of traditional wet storage (Hou Qi)." },
                            { name: "stems", color: "#e9f7ef", pro: "A woody, slightly sweet, and pale green profile. Characteristic of Kukicha (twig tea).", con: "A light, slightly woody and sweet green flavor without the bitterness of leaves.", tidbit: "Kukicha is made entirely of the stems and twigs of the tea plant, making it naturally very low in caffeine." },
                            { name: "straw", color: "#e9f7ef", pro: "A dry, oxidized green note. Often found in older or faded green teas (past crop).", con: "A dry, flat, and dusty green flavor like dried hay.", tidbit: "Green tea has the shortest shelf life of all teas; within a year, its vibrant grassy notes fade into dull straw." }
                        ]},
                        { name: "WOOD", color: "#d4efdf", children: [
                            { name: "pine", color: "#e9f7ef", pro: "Alpha-pinene. A sharp, resinous wood note. Central to Lapsang Souchong's smoking process.", con: "A sharp, evergreen aroma like walking through a pine forest.", tidbit: "Only specifically sourced, resin-heavy pine wood is used to traditionally smoke authentic Wuyi Lapsang Souchong." },
                            { name: "cedar", color: "#e9f7ef", pro: "A sweet, aromatic, and dry wood note. Found in some aged Taiwanese oolongs.", con: "A sweet, fragrant, and comforting woodiness, like an old cedar chest.", tidbit: "Storing tea in cedar boxes is generally avoided as the strong wood oils will permanently alter the tea's flavor." },
                            { name: "cherry wood", color: "#e9f7ef", pro: "A sweet, slightly fruity, and warm wood profile.", con: "A soft, sweet wood flavor with a hint of red fruit.", tidbit: "Tea caddies in Japan are often crafted from cherry bark (Kabazaiku) because it naturally regulates humidity." },
                            { name: "green wood", color: "#e9f7ef", pro: "A sappy, astringent, and unripe wood note. Can indicate harsh processing or young leaves.", con: "A sharp, sappy, and slightly bitter flavor like stripping the bark off a live branch.", tidbit: "A green wood flavor is usually considered a defect, indicating the tea wasn't roasted or oxidized quite enough." },
                            { name: "dark wood", color: "#e9f7ef", pro: "A heavy, rich, and oxidized profile. Common in fully oxidized, older black teas.", con: "A deep, rich, and antique wood flavor like polished mahogany.", tidbit: "Aged black teas lose their brisk astringency and develop deep, comforting dark wood characteristics." },
                            { name: "sawdust", color: "#e9f7ef", pro: "A dry, particulate, and slightly stale wood note. Often a sign of staling or poor storage.", con: "A dry, flat, and dusty flavor.", tidbit: "Tea bags often contain 'fannings' and 'dust'—the smallest particles of tea that can sometimes taste like sawdust due to rapid oxidation." }
                        ]},
                        { name: "EARTH", color: "#d4efdf", children: [
                            { name: "camphor", color: "#e9f7ef", pro: "A cooling, medicinal, and earthy note. Highly prized in aged raw Pu-erh from old trees.", con: "A sharp, cooling, and slightly medicinal flavor similar to Vicks VapoRub or mothballs.", tidbit: "Camphor notes in Pu-erh are believed to come from the tea trees growing alongside actual camphor trees in the Yunnan forests." },
                            { name: "resin", color: "#e9f7ef", pro: "A sticky, sharp, and sap-like note. Found in some wild arbor teas.", con: "A sharp, slightly bitter, and sticky pine-sap flavor.", tidbit: "Tea leaves are coated in a natural wax to protect them; intense processing can sometimes bring out resinous qualities." },
                            { name: "bark", color: "#e9f7ef", pro: "A dry, tannic, and earthy profile.", con: "A dry, rough, and earthy flavor.", tidbit: "Some herbal teas, like Cinnamon or Yohimbe, are actually made entirely of tree bark." },
                            { name: "peat", color: "#e9f7ef", pro: "A dense, smoky, and earthy note. Found in heavily roasted or uniquely aged dark teas.", con: "A rich, earthy, and smoky flavor similar to Islay Scotch whisky.", tidbit: "Peat is rarely used in tea processing, but the flavor profile can be replicated through specific fungal fermentation in dark teas." },
                            { name: "moss", color: "#e9f7ef", pro: "A damp, green, and earthy note. Characteristic of some wet-stored Pu-erhs.", con: "A soft, damp, and earthy flavor like walking through a wet forest.", tidbit: "The environment where tea grows deeply affects its taste; teas from constantly misty, mossy ravines often absorb that character." },
                            { name: "wet wood", color: "#e9f7ef", pro: "A damp, musty profile. Can be a sign of poor storage or a stage in Pu-erh fermentation.", con: "A damp, heavy flavor like a rain-soaked log.", tidbit: "During the 'wet piling' process of Shou Pu-erh, the tea literally tastes like a wet forest floor for the first few months." },
                            { name: "wet earth", color: "#e9f7ef", pro: "Geosmin. A classic note of ripe (Shou) Pu-erh. Results from microbial fermentation.", con: "A deep, comforting flavor identical to the smell of soil after a heavy rain (petrichor).", tidbit: "Geosmin, the chemical that causes this flavor, is produced by soil bacteria and is detectable by humans at incredibly low concentrations." },
                            { name: "leather", color: "#e9f7ef", pro: "A complex, oxidized, and slightly animalic note. Prized in aged raw Pu-erh and fine Assams.", con: "A dry, rich, and sophisticated aroma exactly like an old leather armchair or saddle.", tidbit: "As raw Pu-erh ages, its bright, astringent green notes slowly morph into deep leather and tobacco profiles." },
                            { name: "forest floor", color: "#e9f7ef", pro: "A complex blend of damp earth, decaying leaves, and mushrooms. Found in Liu Bao and Pu-erh.", con: "A savory, damp, and incredibly earthy flavor like autumn leaves on the ground.", tidbit: "Dark teas (Hei Cha) actually rely on specific molds and yeasts to develop this forest floor complexity." },
                            { name: "decaying wood", color: "#e9f7ef", pro: "Advanced fungal fermentation. A hallmark of traditional wet-storage dark teas.", con: "A very heavy, damp, and funky earthiness.", tidbit: "While it sounds unappealing, this note in high-end aged tea provides a thick, comforting mouthfeel that coats the throat." },
                            { name: "compost", color: "#e9f7ef", pro: "Extreme fermentation. Often a sign that a ripe Pu-erh hasn't rested long enough after processing.", con: "An overwhelming, hot, and funky earth aroma.", tidbit: "Newly produced Shou Pu-erh needs to rest for a few years to let these extreme compost notes dissipate." },
                            { name: "musty", color: "#e9f7ef", pro: "TCA or damp storage indication. A flat, dull, and dusty note.", con: "A stale, old basement smell.", tidbit: "Mustiness is generally a defect, meaning the tea was stored in an environment without proper airflow." }
                        ]},
                        { name: "MINERAL", color: "#d4efdf", children: [
                            { name: "metallic", color: "#e9f7ef", pro: "Often a sign of hard brewing water or high iron content in the tea leaves.", con: "A sharp, biting flavor like licking a copper penny.", tidbit: "Historically, cast iron teapots (Tetsubin) were prized because they slightly altered the water's mineral content, sweetening the tea." },
                            { name: "wet rocks", color: "#e9f7ef", pro: "A clean, stony, and crisp mineral profile. The absolute signature of Wuyi Rock Teas (Yancha).", con: "A crisp, clean, and grounding flavor like the smell of river stones after a rain.", tidbit: "Wuyi Rock Teas grow in actual rocky crevices in a national park; their roots absorb immense amounts of minerals, yielding the famous 'Rock Rhyme' (Yan Yun)." }
                        ]},
                        { name: "MARINE", color: "#d4efdf", children: [
                            { name: "salt", color: "#e9f7ef", pro: "A savory, sodium-like impression often tied to high umami/amino acid content.", con: "A savory, mouth-watering brininess.", tidbit: "In the Tang Dynasty, tea was traditionally boiled with a pinch of salt to enhance its flavor." },
                            { name: "seaweed", color: "#e9f7ef", pro: "Dimethyl sulfide (DMS). A hallmark of heavily shaded Japanese green teas like Gyokuro.", con: "A rich, savory, and oceanic flavor exactly like nori (sushi seaweed).", tidbit: "Shading Japanese tea plants blocks photosynthesis, which ramps up the production of savory amino acids like L-theanine." },
                            { name: "ocean air", color: "#e9f7ef", pro: "A brisk, slightly briny and fresh ozone note. Found in coastal-grown Japanese Sencha.", con: "A fresh, breezy, and slightly salty aroma.", tidbit: "Terroir is powerful; tea grown on coastal farms in Japan literally absorbs the salty sea breezes into the leaves." },
                            { name: "fish", color: "#e9f7ef", pro: "A severe defect caused by excessive dimethyl sulfide, poor storage, or bad fertilizer.", con: "An unpleasant, harsh, and fishy smell.", tidbit: "A fishy taste in green tea or matcha is a definitive sign of low quality or improperly applied fish-meal fertilizer." }
                        ]},
                        { name: "VEGETABLES", color: "#d4efdf", children: [
                            { name: "garden peas", color: "#e9f7ef", pro: "A sweet, vibrant green note. Highly desirable in premium spring green teas.", con: "A bright, sweet, and comforting vegetable flavor like fresh snap peas.", tidbit: "The first harvest of spring (Pre-Qingming) yields the sweetest, most pea-like green teas due to high amino acid content built up over winter." },
                            { name: "green pepper", color: "#e9f7ef", pro: "Methoxypyrazines. A sharp, slightly spicy vegetal note.", con: "A crisp, slightly sharp flavor like a raw green bell pepper.", tidbit: "This note can indicate the tea was grown in a slightly cooler climate, slowing down the breakdown of these specific pyrazines." },
                            { name: "asparagus", color: "#e9f7ef", pro: "A savory, slightly sulfurous green note. Found in some steamed Japanese teas.", con: "A rich, steamed vegetable flavor.", tidbit: "The savory, asparagus-like umami in fine Japanese tea is so intense it is sometimes compared to chicken broth." }
                        ]}
                    ]
                }
            ]
        };

        // --- D3 VISUALIZATION & INTERACTION LOGIC ---
        const width = 800;
        const radius = width / 2;

        const svg = d3.select("#wheel-container")
            .append("svg")
            .attr("width", width)
            .attr("height", width)
            .attr("viewBox", `0 0 ${width} ${width}`);

        const wheelGroup = svg.append("g")
            .attr("transform", `translate(${width / 2},${width / 2})`);

        const partition = d3.partition()
            .size([2 * Math.PI, radius - 60]);

        const root = d3.hierarchy(teaData)
            .sum(d => d.children ? 0 : 1);

        partition(root);

        const arc = d3.arc()
            .startAngle(d => d.x0)
            .endAngle(d => d.x1)
            .innerRadius(d => d.y0)
            .outerRadius(d => d.y1)
            .padAngle(0.002);

        // Draw Slices
        wheelGroup.selectAll("path")
            .data(root.descendants().filter(d => d.depth > 0))
            .enter().append("path")
            .attr("d", arc)
            .style("fill", d => d.data.color)
            .style("stroke", "#fff")
            .style("stroke-width", "1px")
            .on("click", handleClick)
            .on("mouseover", function(event, d) {
                d3.select(this).style("opacity", 0.7).style("stroke", "#34495e").style("stroke-width", "2px");
            })
            .on("mouseout", function(event, d) {
                d3.select(this).style("opacity", 1).style("stroke", "#fff").style("stroke-width", "1px");
            });

        // Draw Labels
        const texts = wheelGroup.selectAll("text")
            .data(root.descendants().filter(d => d.depth > 0))
            .enter().append("text")
            .attr("transform", function(d) {
                const x0 = (d.x0 + d.x1) / 2 * 180 / Math.PI;
                const y = (d.y0 + d.y1) / 2;
                return `rotate(${x0 - 90}) translate(${y},0) rotate(${x0 < 180 ? 0 : 180})`;
            })
            .attr("dy", "0.35em")
            .attr("text-anchor", "middle")
            .style("font-size", d => {
                if (d.depth === 1) return "14px";
                if (d.depth === 2) return "11px";
                return "10px";
            })
            .style("font-weight", d => d.depth === 1 ? "bold" : "500")
            .style("fill", d => {
                const hex = d.data.color.replace('#', '');
                const r = parseInt(hex.substr(0, 2), 16);
                const g = parseInt(hex.substr(2, 2), 16);
                const b = parseInt(hex.substr(4, 2), 16);
                const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
                return (yiq >= 128) ? "#2c3e50" : "#ffffff";
            })
            .style("pointer-events", "none")
            .text(d => {
                if (d.x1 - d.x0 < 0.015 && d.depth > 2) return ""; // Hide if slice is too small
                return d.data.name;
            });

        // Drag/Spin Behavior
        let currentAngle = 0;
        let startAngle = 0;

        const drag = d3.drag()
            .on("start", function(event) {
                const [x, y] = d3.pointer(event, svg.node());
                const dx = x - width / 2;
                const dy = y - width / 2;
                startAngle = Math.atan2(dy, dx) * 180 / Math.PI - currentAngle;
            })
            .on("drag", function(event) {
                const [x, y] = d3.pointer(event, svg.node());
                const dx = x - width / 2;
                const dy = y - width / 2;
                const newAngle = Math.atan2(dy, dx) * 180 / Math.PI;
                
                currentAngle = newAngle - startAngle;
                
                wheelGroup.attr("transform", `translate(${width / 2},${width / 2}) rotate(${currentAngle})`);
                
                texts.attr("transform", function(d) {
                    const x0 = (d.x0 + d.x1) / 2 * 180 / Math.PI;
                    const y = (d.y0 + d.y1) / 2;
                    let absoluteAngle = (x0 + currentAngle) % 360;
                    if (absoluteAngle < 0) absoluteAngle += 360;
                    return `rotate(${x0 - 90}) translate(${y},0) rotate(${absoluteAngle > 90 && absoluteAngle < 270 ? 180 : 0})`;
                });
            });

        svg.call(drag);

        function handleClick(event, d) {
            if (event.defaultPrevented) return; // ignore click if dragged

            const contentArea = document.getElementById("content-area");
            
            let breadcrumbs = [];
            let current = d;
            while(current.parent) {
                breadcrumbs.unshift(current.data.name);
                current = current.parent;
            }
            const subtitle = breadcrumbs.join(" > ");

            if (!d.data.pro) {
                contentArea.innerHTML = `
                    <div class="placeholder" style="margin-top: 30%;">
                        <h2>${d.data.name}</h2>
                        <p class="category-subtitle">${subtitle}</p>
                        <p>This is a broader category. Click on a specific descriptor on the <strong>outer edges</strong> of this section to view professional insights and tidbits.</p>
                    </div>
                `;
                return;
            }

            contentArea.innerHTML = `
                <h1 style="text-transform: capitalize;">${d.data.name}</h1>
                <div class="category-subtitle">${subtitle}</div>
                
                <div class="card">
                    <span class="level-badge badge-pro">Professional / Sommelier</span>
                    <h2>Technical & Chemical Origin</h2>
                    <p>${d.data.pro}</p>
                </div>

                <div class="card">
                    <span class="level-badge badge-consumer">Tasting Room</span>
                    <h2>Consumer Translation</h2>
                    <p>${d.data.con}</p>
                </div>

                <div class="card">
                    <span class="level-badge badge-tidbit">Tea Tidbit</span>
                    <h2>Did You Know?</h2>
                    <p>${d.data.tidbit}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
