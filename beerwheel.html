<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Beer Flavor Wheel Study Tool</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --primary-bg: #ffffff;
            --panel-bg: #f8f9fa;
            --text-main: #212529;
            --border-color: #dee2e6;
            --somm-color: #721c24;
            --somm-bg: #f8d7da;
            --consumer-color: #0f5132;
            --consumer-bg: #d1e7dd;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-color: var(--primary-bg);
            color: var(--text-main);
        }

        #wheel-container {
            flex: 1.2;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background-color: #fafafa;
        }

        /* Update cursors to indicate the spinnable feature */
        svg {
            cursor: grab;
            filter: drop-shadow(0px 10px 20px rgba(0,0,0,0.05));
        }

        svg:active {
            cursor: grabbing;
        }

        path {
            cursor: pointer;
        }

        #info-panel {
            flex: 0.8;
            min-width: 400px;
            max-width: 500px;
            background-color: var(--panel-bg);
            border-left: 1px solid var(--border-color);
            padding: 40px 30px;
            box-shadow: -5px 0 15px rgba(0,0,0,0.03);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .level-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.75em;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .badge-somm { background-color: var(--somm-bg); color: var(--somm-color); border: 1px solid #f5c6cb; }
        .badge-consumer { background-color: var(--consumer-bg); color: var(--consumer-color); border: 1px solid #badbcc; }

        h1 { margin: 0 0 5px 0; font-size: 2.2em; color: #111; }
        .category-subtitle { font-size: 1em; color: #6c757d; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 2px solid var(--border-color); text-transform: uppercase; letter-spacing: 1px; }
        h2 { font-size: 1.2em; margin: 0 0 10px 0; color: #333; }
        p { line-height: 1.6; margin-top: 0; color: #495057; font-size: 0.95em; }

        .card {
            background: white;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            border: 1px solid #edf2f7;
            transition: transform 0.2s ease;
        }

        .card:hover { transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.05); }

        .placeholder {
            text-align: center;
            color: #adb5bd;
            margin-top: 40%;
            transform: translateY(-50%);
        }
        
        .placeholder h2 { color: #6c757d; }
        .placeholder p { color: #868e96; }
    </style>
</head>
<body>

                <p><strong>Spin the wheel</strong> to explore, and click on any outer slice to view detailed chemical breakdowns for exams and accessible translations for guests.</p>
            </div>
        </div>
    </div>

                    name: "Mouthfeel", color: "#ff66b2",
                    children: [
                        { name: "Bitter", color: "#ff99cc", sommInfo: "Iso-alpha acids isomerized during the boil. Measured in IBUs. Provides critical balance to malt sweetness.", consumerInfo: "The sharp, dry sensation on the back of the tongue, similar to black coffee or bitter greens." },
                        { name: "Salty", color: "#ff99cc", sommInfo: "Sodium chloride. Rare in most beer styles. A stylistic requirement for the historical Gose style from Leipzig.", consumerInfo: "A slight saline, briny quality that makes the beer very thirst-quenching." },
                        { name: "Alkaline", color: "#ff99cc", sommInfo: "High pH in brewing water or excessive extraction of silicates from grain husks.", consumerInfo: "A soapy, slippery, or chalky mouthfeel." },
                        { name: "Mouthcoating", color: "#ff99cc", sommInfo: "High levels of beta-glucans, proteins, or dextrins. Often desired in Oatmeal Stouts or Hazy IPAs.", consumerInfo: "A dense, creamy texture that leaves a lingering film in the mouth." },
                        { name: "Metallic", color: "#ff99cc", sommInfo: "Ferrous sulfate. Leaching from poor-quality equipment, bad water, or malt issues. Noticeable on the skin (rub some on your hand and smell).", consumerInfo: "Tastes exactly like licking a copper penny or biting your lip." },
                        { name: "Drying", color: "#ff99cc", sommInfo: "High attenuation (low final gravity), high carbonation, or high sulfate-to-chloride water ratios (Burtonization).", consumerInfo: "A crisp finish that actively makes your mouth feel dry and ready for the next sip." },
                        { name: "Tart", color: "#ff99cc", sommInfo: "Mild lactic or malic acid presence. Lowers the pH of the beer creating a bright finish.", consumerInfo: "A gentle, fruity acidity, like a slightly underripe green grape." },
                        { name: "Puckering", color: "#ff99cc", sommInfo: "High Titratable Acidity (TA) combined with extremely low pH (under 3.2), common in intense mixed-fermentation sours.", consumerInfo: "An intense, face-scrunching sourness." },
                        { name: "Powdery", color: "#ff99cc", sommInfo: "Suspended particles (yeast, hop matter, or proteins) creating a physical, particulate sensation.", consumerInfo: "A dusty or chalky feeling on the tongue, like crushed aspirin." },
                        { name: "Flat", color: "#ff99cc", sommInfo: "Lack of dissolved CO2. Indicates poor packaging, failed bottle-conditioning, or simply an authentic British Cask Ale.", consumerInfo: "Little to no bubbles. Can feel lifeless, but is traditional for some English pub ales." },
                        { name: "Gassy", color: "#ff99cc", sommInfo: "Over-carbonation. Can be a packaging flaw, an infection (diastaticus), or a stylistic trait (Belgian Tripels).", consumerInfo: "Aggressively bubbly, almost prickly, filling the stomach quickly." },
                        { name: "Piquant", color: "#ff99cc", sommInfo: "A spicy/prickly physical sensation. Can derive from high carbonation interacting with alcohol and phenols.", consumerInfo: "A sharp, lively, and slightly spicy tingle on the tongue." }
                    ]
                },
                {
                    name: "Fullness", color: "#ff4d4d",
                    children: [
                        { name: "Body", color: "#ff6666", children: [
                            { name: "Watery", color: "#ff9999", sommInfo: "Extremely low terminal gravity and lack of proteins/dextrins. A flaw in robust styles, intentional in light lagers.", consumerInfo: "Thin and flavorless, lacking any weight on the palate." },
                            { name: "Characterless", color: "#ff9999", sommInfo: "A total lack of malt complexity, ester profile, or hop presence. Blandness.", consumerInfo: "Completely neutral, tasting more like water than beer." },
                            { name: "Satiating", color: "#ff9999", sommInfo: "A balanced, full mouthfeel providing caloric and sensory satisfaction without being overly cloying.", consumerInfo: "A deeply satisfying, bready fullness that feels like a 'meal in a glass'." },
                            { name: "Thick", color: "#ff9999", sommInfo: "Massive malt bill, high unfermentable sugars, and elevated protein content (oats, wheat). Common in Imperial Stouts.", consumerInfo: "Extremely heavy and viscous, drinking almost like motor oil or syrup." }
                        ]}
                    ]
                }
            ]
        };

        const width = 850;
        const radius = width / 2;

        const svg = d3.select("#wheel-container")
            .append("svg")
            .attr("width", width)
            .attr("height", width)
            .attr("viewBox", `0 0 ${width} ${width}`);

        // We wrap the wheel in a distinct group so we can rotate the entire group easily
        const wheelGroup = svg.append("g")
            .attr("transform", `translate(${width / 2},${width / 2})`);

        const partition = d3.partition()
            .size([2 * Math.PI, radius - 40]);

        const root = d3.hierarchy(wheelData)
            .sum(d => d.children ? 0 : 1);

        partition(root);

        const arc = d3.arc()
            .startAngle(d => d.x0)
            .endAngle(d => d.x1)
            .innerRadius(d => d.y0)
            .outerRadius(d => d.y1)
            .padAngle(0.003);

        const paths = wheelGroup.selectAll("path")
            .data(root.descendants().filter(d => d.depth > 0))
            .enter().append("path")
            .attr("d", arc)
            .style("fill", d => d.data.color)
            .style("stroke", "#fff")
            .style("stroke-width", "1px")
            .on("click", handleClick)
            .on("mouseover", function(event, d) {
                d3.select(this).style("opacity", 0.7).style("stroke", "#333").style("stroke-width", "2px");
            })
            .on("mouseout", function(event, d) {
                d3.select(this).style("opacity", 1).style("stroke", "#fff").style("stroke-width", "1px");
            });

        // Add text labels
        const texts = wheelGroup.selectAll("text")
            .data(root.descendants().filter(d => d.depth > 0))
            .enter().append("text")
            .attr("transform", function(d) {
                const x0 = (d.x0 + d.x1) / 2 * 180 / Math.PI;
                const y = (d.y0 + d.y1) / 2;
                return `rotate(${x0 - 90}) translate(${y},0) rotate(${x0 < 180 ? 0 : 180})`;
            })
            .attr("dy", "0.35em")
            .attr("text-anchor", "middle")
            .style("font-size", d => d.depth === 1 ? "11px" : "10px")
            .style("font-weight", d => d.depth === 1 ? "bold" : "normal")
            .style("fill", "#111")
            .style("pointer-events", "none")
            .text(d => {
                if (d.x1 - d.x0 < 0.03) return "";
                return d.data.name;
            });

        // --- NEW DRAG/SPIN LOGIC ---
        let currentAngle = 0;
        let startAngle = 0;

        const drag = d3.drag()
            .on("start", function(event) {
                // Determine the starting touch/mouse coordinate relative to the center
                const [x, y] = d3.pointer(event, svg.node());
                const dx = x - width / 2;
                const dy = y - width / 2;
                startAngle = Math.atan2(dy, dx) * 180 / Math.PI - currentAngle;
            })
            .on("drag", function(event) {
                const [x, y] = d3.pointer(event, svg.node());
                const dx = x - width / 2;
                const dy = y - width / 2;
                const newAngle = Math.atan2(dy, dx) * 180 / Math.PI;
                
                currentAngle = newAngle - startAngle;
                
                // Spin the entire wheel group
                wheelGroup.attr("transform", `translate(${width / 2},${width / 2}) rotate(${currentAngle})`);
                
                // Dynamically flip the text nodes so they are always right-side up
                texts.attr("transform", function(d) {
                    const x0 = (d.x0 + d.x1) / 2 * 180 / Math.PI; // Original angle on the wheel
                    const y = (d.y0 + d.y1) / 2;
                    
                    // Calculate absolute position on the screen based on the spin
                    let absoluteAngle = (x0 + currentAngle) % 360;
                    if (absoluteAngle < 0) absoluteAngle += 360;
                    
                    // If the text makes it to the left side of the screen, flip it 180 degrees
                    return `rotate(${x0 - 90}) translate(${y},0) rotate(${absoluteAngle < 180 ? 0 : 180})`;
                });
            });

        svg.call(drag);

        function handleClick(event, d) {
            // Ignore the click event if the user was just dragging/spinning the wheel
            if (event.defaultPrevented) return;

            const contentArea = document.getElementById("content-area");
            
            // Build breadcrumbs for category subtitle
            let breadcrumbs = [];
            let current = d;
            while(current.parent) {
                breadcrumbs.unshift(current.data.name);
                current = current.parent;
            }
            const subtitle = breadcrumbs.join(" > ");

            if (!d.data.sommInfo) {
                contentArea.innerHTML = `
                    <div class="placeholder" style="margin-top: 20%;">
                        <h2>${d.data.name}</h2>
                        <p class="category-subtitle">${subtitle}</p>
                        <p>This is a broader category ring. <br><br>Click on a specific descriptor on the <b>outer edge</b> of this slice to view the detailed study data.</p>
                    </div>
                `;
                return;
            }

            contentArea.innerHTML = `
                <h1>${d.data.name}</h1>
                <div class="category-subtitle">${subtitle}</div>
                
                <div class="card">
                    <span class="level-badge badge-somm">Sommelier / Cicerone Exam</span>
                    <h2>Technical & Chemical Origin</h2>
                    <p>${d.data.sommInfo}</p>
                </div>

                <div class="card">
                    <span class="level-badge badge-consumer">Guest / Floor Translation</span>
                    <h2>Tasting Room Description</h2>
                    <p>${d.data.consumerInfo}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
