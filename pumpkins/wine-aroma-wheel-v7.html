<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wine Aroma & Flavor Wheel — Mark Lenington</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root,[data-theme="light"]{--bg:#faf8f3;--text:#2b251d;--muted:#857966;--line:#e2dacb;--panel:#fff;--accent:#8a5a2a;--gold:#a87f3d;--sep:#faf8f3;--hub:#fffdf8;--hub-text:#6b573a;--badge-bg:#f4eee2;--badge-line:#d8cdb8;--shadow:0 8px 30px rgba(80,60,30,.14);}
[data-theme="dark"]{--bg:#16130e;--text:#e9e2d4;--muted:#9a8d78;--line:#393226;--panel:#1e1a14;--accent:#c9a96e;--gold:#d4b276;--sep:#16130e;--hub:#211c14;--hub-text:#d8c294;--badge-bg:#2a241a;--badge-line:#4a4030;--shadow:0 10px 34px rgba(0,0,0,.55);}
html{background:var(--bg);}
body{font-family:Georgia,'Times New Roman',serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;transition:background .25s,color .25s;}
.topbar{width:100%;max-width:1100px;display:flex;justify-content:flex-end;gap:.5rem;padding:.7rem 1rem 0;}
.topbar button{background:none;border:1px solid var(--line);color:var(--muted);font-family:inherit;font-size:.75rem;border-radius:6px;padding:.35rem .7rem;cursor:pointer;}
.topbar button:hover{color:var(--text);border-color:var(--muted);}
h1{font-size:1.4rem;font-weight:400;letter-spacing:.04em;padding:.2rem 1rem .15rem;text-align:center;}
.byline{font-size:.78rem;color:var(--muted);text-align:center;margin-bottom:.2rem;}
.byline em{color:var(--accent);font-style:italic;}
.spin-hint{font-size:.72rem;color:var(--muted);text-align:center;margin-bottom:.55rem;}
.controls{display:flex;align-items:center;gap:.55rem;flex-wrap:wrap;justify-content:center;border:1px solid var(--line);border-radius:8px;padding:.4rem .9rem;margin-bottom:1rem;max-width:96vw;background:var(--panel);}
.controls .ctl-label{font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.controls button{background:none;border:1px solid var(--line);color:var(--text);font-family:inherit;font-size:.9rem;line-height:1;border-radius:6px;padding:.32rem .65rem;cursor:pointer;min-width:2.1rem;min-height:2.1rem;}
.controls button:hover{border-color:var(--gold);color:var(--accent);}
.controls button:focus-visible{outline:2px solid var(--gold);outline-offset:1px;}
.controls input[type=range]{width:150px;accent-color:var(--gold);cursor:pointer;}
.size-ctl{display:flex;align-items:center;gap:.55rem;}
.view-toggle{display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden;}
.view-toggle button{border:none;border-radius:0;min-width:3.4rem;}
.view-toggle button.active{background:var(--badge-bg);color:var(--accent);font-weight:bold;}
.layout{display:flex;gap:0;width:100%;max-width:1180px;align-items:flex-start;padding:0 1rem 2.5rem;justify-content:center;}
.wheel-wrap{flex:0 0 auto;display:flex;justify-content:center;}
#wheelSvg{cursor:grab;user-select:none;touch-action:none;filter:drop-shadow(var(--shadow));}
#wheelSvg:active{cursor:grabbing;}
#wheelSvg .cell{stroke:var(--sep);stroke-width:1.5;}
#wheelSvg .desc-seg{cursor:pointer;transition:filter .15s;}
#wheelSvg .desc-seg:hover{filter:brightness(1.12) saturate(1.05);}
#wheelSvg .desc-seg.selected{stroke:var(--gold);stroke-width:2.4;}
#wheelSvg .hub{fill:var(--hub);stroke:var(--gold);stroke-width:1.4;}
#wheelSvg .hub-text{fill:var(--hub-text);}
#wheelSvg .rim{fill:none;stroke:var(--line);stroke-width:1;}
@media (prefers-reduced-motion:reduce){#wheelSvg .desc-seg{transition:none;}}
#listView{display:none;flex:0 1 auto;width:min(720px,94vw);}
#listView.active{display:block;}
#listSearch{width:100%;padding:.55rem .85rem;font-family:inherit;font-size:.92rem;background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--text);margin-bottom:1rem;}
#listSearch:focus{outline:none;border-color:var(--gold);}
.cat-block{margin-bottom:1rem;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:.7rem .9rem;}
.cat-head{display:flex;align-items:center;gap:.45rem;font-size:.74rem;font-weight:bold;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;}
.cat-dot{width:.7rem;height:.7rem;border-radius:3px;flex:0 0 auto;}
.sub-group{margin-bottom:.5rem;}
.sub-label{font-size:.64rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);opacity:.8;margin-bottom:.3rem;}
.chip-row{display:flex;flex-wrap:wrap;gap:.4rem;}
.list-chip{font-size:.82rem;font-family:inherit;background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:.32rem .62rem;cursor:pointer;color:var(--text);}
.list-chip:hover{border-color:var(--gold);color:var(--accent);}
.list-chip:focus-visible{outline:2px solid var(--gold);outline-offset:1px;}
.list-chip.selected{border-color:var(--gold);background:var(--badge-bg);color:var(--accent);font-weight:bold;}
#noResults{display:none;color:var(--muted);font-style:italic;font-size:.88rem;padding:.4rem 0;}
.detail-panel{flex:1;min-width:280px;max-width:380px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:1.3rem 1.5rem;min-height:360px;margin-left:1.4rem;}
.panel-header{display:flex;align-items:center;justify-content:space-between;gap:.6rem;cursor:grab;touch-action:none;user-select:none;-webkit-user-select:none;margin:-1.3rem -1.5rem 1rem;padding:.5rem .9rem .45rem;border-bottom:1px solid var(--line);border-radius:9px 9px 0 0;}
.panel-header:active{cursor:grabbing;}
.panel-header .grip-title{font-size:.7rem;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);}
.panel-header .grip-dots{color:var(--line);letter-spacing:2px;margin-right:.4rem;}
.panel-header button{background:none;border:1px solid var(--line);color:var(--text);font-family:inherit;font-size:.66rem;border-radius:5px;padding:.22rem .5rem;cursor:pointer;display:none;}
.panel-header button:hover{border-color:var(--gold);color:var(--accent);}
.detail-panel.floating{position:fixed;z-index:60;margin:0;width:min(380px,92vw);max-height:80vh;overflow-y:auto;box-shadow:var(--shadow);border-color:var(--gold);}
.detail-panel.floating .panel-header{position:sticky;top:0;z-index:2;background:var(--panel);}
.detail-panel.floating .panel-header button{display:inline-block;}
.detail-panel h2{font-size:1.3rem;margin-bottom:.15rem;font-weight:400;font-style:italic;color:var(--accent);}
.detail-panel h2 a{color:inherit;text-decoration:none;border-bottom:1px dotted var(--gold);}
.detail-panel h2 a:hover,.detail-panel h2 a:focus-visible{border-bottom-style:solid;color:var(--gold);outline:none;}
.wiki-mark{font-size:.6em;margin-left:.28rem;font-style:normal;color:var(--gold);vertical-align:super;}
.detail-panel .category-tag{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem;}
.section-title{font-size:.66rem;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin:.85rem 0 .25rem;font-weight:bold;border-bottom:1px solid var(--line);padding-bottom:2px;}
.body-text{font-size:.85rem;line-height:1.65;color:var(--text);}
.flag-note{font-size:.74rem;color:var(--gold);background:var(--badge-bg);border:1px solid var(--gold);border-radius:6px;padding:.5rem .7rem;margin-top:.6rem;line-height:1.5;}
.grid-list{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.3rem;}
.grid-badge{font-size:.74rem;background:var(--badge-bg);border:1px solid var(--gold);padding:.18rem .5rem;border-radius:4px;}
.placeholder{color:var(--muted);font-size:.95rem;margin-top:2.5rem;text-align:center;font-style:italic;}
@media(max-width:800px){.layout{flex-direction:column;align-items:center;}.detail-panel{margin-left:0;margin-top:1rem;width:100%;max-width:95vw;}h1{font-size:1.15rem;}}
</style>
</head>

const DESCRIPTIONS = {"iris": {"cat": "Flower", "origin": "The scent of iris in wine comes primarily from irones—a family of aroma compounds derived from degraded carotenoids in aged Riesling and old-vine Viognier. Cool-climate whites from Alsace and the Northern Rhône often develop this powdery, violet-like note after extended bottle aging. The compound alpha-irone is also found in orris root and expensive perfumery ingredients.", "chemistry": "Key compounds: alpha-irone, beta-irone (irone family, degraded carotenoids)"}, "peony": {"cat": "Flower", "origin": "Peony aromas in wine arise from a blend of linalool, geraniol, and various rose oxide compounds that accumulate in aromatic white varieties. Grüner Veltliner and Pinot Gris from cool climates occasionally show this gentle floral note. The scent is softer and more diffuse than rose, suggesting white or pink petals rather than red.", "chemistry": "Key compounds: linalool, geraniol, rose oxide"}, "elderflower": {"cat": "Flower", "origin": "Elderflower is one of the signature notes of Sauvignon Blanc from the Loire Valley and New Zealand, as well as unoaked Grüner Veltliner. The compound responsible is primarily cis-rose oxide alongside nerol and linalool. In German Riesling at Spätlese ripeness, a burst of elderflower marks the point between lean herbaceousness and honeyed fruit.", "chemistry": "Key compounds: cis-rose oxide, nerol, linalool"}, "acacia": {"cat": "Flower", "origin": "Acacia blossom gives a creamy, sweet-floral character distinct from more pungent flowers. It appears frequently in young white Burgundy (Chardonnay), Condrieu (Viognier), and Champagne at the disgorgement stage. Linalool and a group of monoterpenes produced during the fermentation of muscat-adjacent varieties contribute to this delicate note.", "chemistry": "Key compounds: linalool, nerol, monoterpene esters"}, "jasmine": {"cat": "Flower", "origin": "Jasmine aromas in wine are driven by indole (at very low concentrations), benzyl alcohol, and methyl jasmonate. Viognier is the variety most often cited for jasmine character, particularly wines from Condrieu in the Northern Rhône. High fermentation temperatures or skin contact can amplify these heady, white-flower compounds in varietals naturally rich in terpenoids.", "chemistry": "Key compounds: methyl jasmonate, benzyl alcohol, indole (trace)"}, "honeysuckle": {"cat": "Flower", "origin": "Honeysuckle notes in wine suggest a sweet, nectar-like floral quality found in wines from Riesling, Gewürztraminer, and Torrontés. The scent shares terpene compounds with acacia and elderflower—primarily linalool and geraniol—but with a hint of peachy sweetness that bridges the floral and tree-fruit categories.", "chemistry": "Key compounds: linalool, geraniol, nerol oxide"}, "lilac": {"cat": "Flower", "origin": "Lilac is a rare and treasured note in wine, appearing sometimes in very ripe, aromatic Gewürztraminers and Muscats. Terpenoids, particularly terpineol and linalool, create this powdery-sweet floral impression. In very warm vintages, the lilac note in Alsatian wine can overpower the more delicate rose oxide profile.", "chemistry": "Key compounds: terpineol, linalool, caryophyllene"}, "violet": {"cat": "Flower", "origin": "Violet is one of wine's most celebrated floral descriptors, especially in Nebbiolo (Barolo, Barbaresco), young Malbec from Mendoza, and Syrah from the Northern Rhône. It originates from ionone compounds—particularly beta-ionone—which form from the degradation of carotenoid pigments during grape ripening and continue to evolve during barrel aging.", "chemistry": "Key compounds: beta-ionone, alpha-ionone (carotenoid breakdown products)"}, "lavender": {"cat": "Flower", "origin": "Lavender notes in wine signal the presence of linalool and its esters, most prominent in wines made from aromatic varieties like Muscat, Gewürztraminer, and Viognier. In Provence rosé, the wild garrigue landscape—where lavender grows abundantly—imparts a regional character that some attribute to an actual terroir influence on fruit composition.", "chemistry": "Key compounds: linalool, linalyl acetate, camphor (trace)"}, "rose": {"cat": "Flower", "origin": "The scent of rose in wine is dominated by geraniol, nerol, and rose oxide—terpene alcohols found in highest concentrations in Gewürztraminer, Muscat à Petits Grains, and Riesling. Rose is also a characteristic note in Nebbiolo wines, where it contrasts dramatically with the grape's fierce tannins. Some skin-contact wines develop rose character from anthocyanin-derived compounds.", "chemistry": "Key compounds: geraniol, nerol, rose oxide (4-methyl-2-(2-methylprop-1-enyl)tetrahydropyran)"}, "hibiscus": {"cat": "Flower", "origin": "Hibiscus aromas appear in lighter-bodied red wines and some rosés, particularly those made from Grenache, Pinot Noir, and the Beaujolais variety Gamay. Bright acidity and fruit esters create this tart-floral impression, with anthocyanins supplying the rosy colour. Hibiscus tea itself has a similar flavour compound profile to Grenache-dominant Châteauneuf-du-Pape rosé.", "chemistry": "Key compounds: citric acid esters, delphinidin (anthocyanin derivative), fruit esters"}, "potpourri": {"cat": "Flower", "origin": "Potpourri is a complex floral-spice blend note found in wines with tertiary development—particularly aged Grenache-based wines from the Southern Rhône, old Zinfandel, and Garnacha. The combination of faded floral terpenes, dried herb volatiles, and slight oxidative aldehyde notes creates the impression of dried flowers and mixed spice.", "chemistry": "Key compounds: aged terpene derivatives, benzaldehyde, dried herb phenolics"}, "lime": {"cat": "Citrus", "origin": "Lime is a hallmark of cool-climate Riesling, particularly from the Clare and Eden Valleys of South Australia, where the high-altitude sites produce wines with piercing citrus acidity and lime zest character. The primary lime compound, citronellal, alongside limonene and citral, concentrates during slow ripening. With age, Riesling lime morphs into a distinctive petrol/lime marmalade note.", "chemistry": "Key compounds: citral, citronellal, limonene"}, "lemon": {"cat": "Citrus", "origin": "Lemon aromas signal bright acidity and light body in wines from Muscadet, Chablis, and Vinho Verde. Citral (a mixture of geranial and neral isomers) is the primary lemon odorant. Lemon zest, with its bitter pith character, can also appear as a finish note in wines made from Albariño and Chenin Blanc from the Loire Valley.", "chemistry": "Key compounds: citral (geranial + neral), limonene, alpha-terpineol"}, "grapefruit": {"cat": "Citrus", "origin": "Grapefruit is one of Sauvignon Blanc's defining aromas, particularly from Marlborough, New Zealand, and Bordeaux. The compound nootkatone provides grapefruit's distinctive bitter-peel quality, while thiols such as 4-mercapto-4-methylpentan-2-one (4MMP) contribute a more tropical grapefruit expression. Pink grapefruit notes in Grenache rosé often indicate co-precipitation of fruit esters.", "chemistry": "Key compounds: nootkatone, 4-mercapto-4-methylpentan-2-one (4MMP thiol)"}, "orange": {"cat": "Citrus", "origin": "Orange aromas appear in sweeter styles of Riesling and Muscat, as well as in skin-contact orange wines. Limonene and linalool create the fresh orange peel impression, while d-limonene dominates the sweet orange pulp character. In Marsala and some oxidative sherries, orange marmalade notes emerge from the interaction of aldehydes with residual sugar.", "chemistry": "Key compounds: d-limonene, linalool, alpha-pinene"}, "marmalade": {"cat": "Citrus", "origin": "Marmalade—cooked, concentrated orange peel—is a classic note in Sauternes, late-harvest Riesling, and aged Chenin Blanc from Vouvray. The cooking process in marmalade (and in botrytized wines) creates furanones and lactones alongside high Brix sugars, yielding that distinctive bittersweet, candied citrus character that sets noble rot wines apart from fresh fruit profiles.", "chemistry": "Key compounds: sotolon (fenugreek/curry lactone), furanones, citral derivatives"}, "quince": {"cat": "Tree Fruit", "origin": "Quince is a key aromatic marker for Chenin Blanc, particularly in Vouvray and Savennières, and for Viognier from Condrieu. The quincy aroma comes from high concentrations of ethyl esters (specifically ethyl hexanoate and ethyl butanoate) alongside a characteristic floral-terpene overlay. Quince paste (membrillo) and fresh quince share this ester-dominant profile.", "chemistry": "Key compounds: ethyl hexanoate, ethyl butanoate, linalool"}, "apple": {"cat": "Tree Fruit", "origin": "Apple is ubiquitous in white wines, from crisp green apple in Champagne (unripe apple = hexyl acetate) to rich golden apple in oaked Chardonnay (ripe apple = ethyl hexanoate). Malic acid is the natural 'apple acid' found in grapes—low levels remain after malolactic fermentation and contribute to an apple-like freshness. Green apple often signals the ML conversion is incomplete.", "chemistry": "Key compounds: hexyl acetate (green apple), ethyl hexanoate (ripe apple), malic acid"}, "pear": {"cat": "Tree Fruit", "origin": "Pear drop aromas are the signature of carbonic maceration (Beaujolais Nouveau), driven by isoamyl acetate—a banana/pear ester produced by yeast under oxygen-free fermentation. In white wines, pear arises from amyl acetates and ethyl esters. Pinot Gris from Alsace and Chardonnay from Macon regularly show ripe pear alongside pastry notes from lees aging.", "chemistry": "Key compounds: isoamyl acetate, amyl acetate, ethyl octanoate"}, "nectarine": {"cat": "Tree Fruit", "origin": "Nectarine bridges the peach and plum characters in the aroma wheel—its smooth skin and bright tartness resemble the interplay of gamma-decalactone (peach) and linalool (floral) in wines like Viognier, Roussanne, and Condrieu. White Burgundy in warm vintages also shows nectarine-tinged stone fruit notes where ripeness pushes past green apple.", "chemistry": "Key compounds: gamma-decalactone, linalool, delta-undecalactone"}, "peach": {"cat": "Tree Fruit", "origin": "Peach is the defining note of Viognier, Roussanne, and warm-climate Chardonnay. Gamma-decalactone and gamma-undecalactone—stone fruit lactones—are the key compounds, boosted by the high fermentation temperatures typical of aromatic white varieties. Botrytized wines, including Sauternes and German TBA, concentrate these lactones dramatically to produce lush peach preserve intensity.", "chemistry": "Key compounds: gamma-decalactone, gamma-undecalactone, linalool"}, "apricot": {"cat": "Tree Fruit", "origin": "Apricot is found in Viognier, Muscat, and Riesling Spätlese through to Trockenbeerenauslese. Apricot aroma is dominated by a blend of gamma-decalactone (peachy), delta-octalactone, and furaneol. Noble rot concentrates these compounds while adding a botrytis-specific ketone (sotolon) that reinforces the dried apricot and honey character common to Sauternes.", "chemistry": "Key compounds: gamma-decalactone, furaneol, beta-damascenone"}, "persimmon": {"cat": "Tree Fruit", "origin": "Persimmon character—exotic, sweet-tangy, tropical-meeting-stone-fruit—appears in ripe Grenache, Zinfandel, and Primitivo from hot climates. The compound beta-damascenone (rose ketone), formed from carotenoid oxidation, contributes both a fruity sweetness and a dried-fruit undertone that evokes the jammy, caramelised quality of ripe persimmon.", "chemistry": "Key compounds: beta-damascenone, furaneol, ethyl esters"}, "pineapple": {"cat": "Tropical Fruit", "origin": "Pineapple aromas in wine indicate warm-climate ripeness or extended sur lie aging. Ethyl caproate and allyl hexanoate are the primary pineapple esters, produced by yeast during fermentation at higher temperatures. New World Chardonnay, Viognier, and some Grüner Veltliner from warm vintages develop these tropical ester profiles. Champagne with high dosage can also suggest pineapple.", "chemistry": "Key compounds: ethyl caproate, allyl hexanoate, isoamyl acetate"}, "mango": {"cat": "Tropical Fruit", "origin": "Mango is associated with warm-climate Viognier, Chardonnay, and the emerging Spanish variety Verdejo at peak ripeness. Myrcene and ocimene (monoterpene hydrocarbons), alongside ethyl butyrate and the thiol 3-mercaptohexanol (3MH), contribute to mango's characteristic tropical profile. Malolactic fermentation can round out the acidity to match the creamy mango impression.", "chemistry": "Key compounds: myrcene, ocimene, ethyl butyrate, 3-mercaptohexanol (3MH)"}, "guava": {"cat": "Tropical Fruit", "origin": "Guava is a hallmark of Sauvignon Blanc from Marlborough, New Zealand, where the volatile thiol 3-mercaptohexanol (3MH) builds to tropical concentrations. Guava's flavour bridges white fruit and tropical fruit—it has a creamy, musky quality alongside bright acidity. Wines with this character are typically fermented cool to preserve delicate thiol aromas.", "chemistry": "Key compounds: 3-mercaptohexanol (3MH), ethyl butyrate, cis-3-hexenol"}, "kiwi": {"cat": "Tropical Fruit", "origin": "Kiwi fruit aromas appear in crisp, high-acid wines including Sauvignon Blanc, Grüner Veltliner, and Verdicchio. The tart-green-fruit impression of kiwi comes from a combination of hexyl acetate, cis-3-hexenol (fresh cut green), and small quantities of the thiol 3-mercaptohexyl acetate (3MHA) at low concentrations.", "chemistry": "Key compounds: hexyl acetate, cis-3-hexenol, 3-mercaptohexyl acetate (3MHA)"}, "lychee": {"cat": "Tropical Fruit", "origin": "Lychee is the signature—almost defining—aroma of Gewürztraminer. The primary odorant is rose oxide, a cyclic ether of the linalool family that provides the characteristic sweet, floral-tropical impression. Concentrated in grape skins, rose oxide survives through fermentation and appears strongly in whole-cluster pressed Gewürztraminer from Alsace and Germany.", "chemistry": "Key compounds: cis-rose oxide, geraniol, linalool"}, "bubblegum": {"cat": "Tropical Fruit", "origin": "Bubblegum is primarily associated with carbonic maceration—the fermentation technique used in Beaujolais Nouveau—and with certain yeasts that overproduce isoamyl acetate. In unfiltered rosé, ethyl acetate and other volatile esters can blend to create a candy-like impression. In very cold fermentations, aromatic varieties can also express a bubblegum note from stressed yeast activity.", "chemistry": "Key compounds: isoamyl acetate, ethyl acetate (at low levels), amyl propionate"}, "cranberry": {"cat": "Red Fruit", "origin": "Cranberry's tart-fruity profile appears in Pinot Noir, Gamay, and Grenache at the lighter end of ripeness. Benzoic acid esters and malic acid interact with fruit phenolics to create the high-acid, tangy impression of fresh cranberry. Cool-climate Pinot Noir from Burgundy and Oregon frequently shows cranberry alongside forest floor and earth.", "chemistry": "Key compounds: benzoic acid esters, malic acid, anthocyanin derivatives"}, "red-plum": {"cat": "Red Fruit", "origin": "Red plum aromas are associated with Tempranillo, Sangiovese, and Merlot at moderate ripeness. Plum aldehydes (benzaldehyde-based compounds) and hexanols create the characteristic stone-fruit/floral skin combination of a ripe but not overripe plum. Chianti Classico and Ribera del Duero wines at five to eight years regularly show red plum alongside leather and dried herb.", "chemistry": "Key compounds: benzaldehyde, hexanol, ethyl hexanoate"}, "pomegranate": {"cat": "Red Fruit", "origin": "Pomegranate—tart, jewel-like, and tannic—is found in Grenache, Nebbiolo, and Dolcetto. The pomegranate impression comes from a combination of punicalagin-like ellagitannins, high malic and citric acid, and the anthocyanin cyanidin-3-glucoside, which supplies colour (anthocyanins are non-volatile — they shape hue and mouthfeel, not aroma). Wines with this note tend to have firm acidity and a refreshing, almost juicy finish.", "chemistry": "Key compounds: cyanidin-3-glucoside (anthocyanin), ellagitannin phenolics, malic acid"}, "sour-cherry": {"cat": "Red Fruit", "origin": "Sour cherry is the cornerstone of Morello cherry character in Sangiovese-based wines (Chianti, Brunello) and Gamza from Bulgaria. Benzaldehyde (the almond-cherry seed compound) and linalool combine with tartaric acid–derived esters to create the sharp, bright, slightly bitter quality of sour cherries in brine. In Barolo, sour cherry transitions to dried-cherry with age.", "chemistry": "Key compounds: benzaldehyde, tartaric acid esters, ethyl hexanoate"}, "strawberry": {"cat": "Red Fruit", "origin": "Strawberry is perhaps the most iconic red wine aroma, dominating young Grenache, Pinot Noir, and Merlot. Furaneol (2,5-dimethyl-4-hydroxy-3[2H]-furanone) is the dominant strawberry compound in both fruit and wine. Methyl anthranilate adds a grape candy dimension in some New World wines, while ethyl methylpropionate contributes a more tart, fresh strawberry character.", "chemistry": "Key compounds: furaneol, methyl anthranilate (trace), ethyl methylpropionate"}, "cherry": {"cat": "Red Fruit", "origin": "Cherry—the versatile midpoint between sour and sweet, red and black—is found across Pinot Noir, Barbera, Sangiovese, and Merlot. Benzaldehyde provides the almond-cherry kernel note; ethyl hexanoate and isoamyl acetate give ripe fruit sweetness; and anthocyanins from grape skins reinforce the red-fruit colour intensity. Bing cherry notes in warm-climate Pinot Noir indicate peak ripeness.", "chemistry": "Key compounds: benzaldehyde, ethyl hexanoate, cyanidin-3-glucoside"}, "raspberry": {"cat": "Red Fruit", "origin": "Raspberry is the signature of Northern Rhône Syrah, Pinot Noir, and young Nebbiolo. The raspberry ketone (4-(4-hydroxyphenyl)-2-butanone) is ironically rare in wine—instead, the raspberry impression comes from beta-ionone, alpha-terpineol, and a combination of bright red fruit esters including geraniol and 1-octanol. High-elevation Malbec from Luján de Cuyo also shows intense raspberry.", "chemistry": "Key compounds: beta-ionone, 1-octanol, geraniol, ethyl hexanoate"}, "boysenberry": {"cat": "Black Fruit", "origin": "Boysenberry—a cross between a blackberry, raspberry, and loganberry—appears as a note in full-bodied reds: Petite Sirah, Zinfandel, and ripe Syrah. The intense dark berry aroma is driven by ethyl octanoate (waxy-fruity) and geraniol; malvidin and cyanidin anthocyanins at high concentration supply the inky colour rather than the scent. The inky quality some tasters note alongside boysenberry comes from iron-tannin binding.", "chemistry": "Key compounds: ethyl octanoate, malvidin-3-glucoside, cyanidin-3-glucoside"}, "black-currant": {"cat": "Black Fruit", "origin": "Black currant (cassis) is the defining note of Cabernet Sauvignon worldwide—from Napa Valley to the Médoc. The key compound is 4-mercapto-4-methylpentan-2-one (4MMP), a sulfur-containing thiol also responsible for cat pee at high concentrations. At optimal levels it creates the characteristic cassis/blackcurrant bud aroma. Pyrazines (from unripe grapes) can add a blackcurrant leaf dimension.", "chemistry": "Key compounds: 4-mercapto-4-methylpentan-2-one (4MMP), isopropyl methoxypyrazine (IPMP), ethyl hexanoate"}, "black-cherry": {"cat": "Black Fruit", "origin": "Black cherry is associated with Merlot, Malbec, Nero d'Avola, and Zinfandel at moderate-to-high ripeness. Benzaldehyde and its esters provide the 'black' cherry stone note, while elevated concentrations of malvidin-3-glucoside (the dominant red/black grape anthocyanin) contribute the dark colour; the aroma itself rides on the benzaldehyde and ester fraction. Black cherry in wine often indicates a supple, mid-weight tannin structure.", "chemistry": "Key compounds: benzaldehyde, malvidin-3-glucoside, ethyl hexanoate"}, "plum": {"cat": "Black Fruit", "origin": "Plum—particularly dark damson or prune-plum—is a primary aromatic note in Merlot, Tempranillo, and Montepulciano. The stone-fruit compounds that create plum character include beta-damascenone (from carotenoid oxidation), hexyl acetate, and hexanol. In riper vintages, plum can shift toward prune as Maillard-like reactions in warm grapes concentrate sugars and drive off fresher esters.", "chemistry": "Key compounds: beta-damascenone, hexyl acetate, hexanol"}, "blueberry": {"cat": "Black Fruit", "origin": "Blueberry is characteristic of Malbec from high-altitude Mendoza vineyards, Petite Sirah, and Southern Rhône blends dominated by Mourvèdre. The blueberry aroma combines beta-caryophyllene (woody-spicy) and linalool, while malvidin anthocyanins supply the saturated colour. Volcanic or ferrous soils can amplify blueberry impression by affecting anthocyanin co-pigmentation, making blueberry a potential marker of mineral terroir.", "chemistry": "Key compounds: beta-caryophyllene, linalool, malvidin-3-glucoside"}, "blackberry": {"cat": "Black Fruit", "origin": "Blackberry is one of the most expected aromas in full-bodied reds—Cabernet Sauvignon, Syrah/Shiraz, and Monastrell. The key compounds include ethyl octanoate, 1-octanol, and the phenolic furfural from oak interaction. The 'bramble' quality of blackberry, with its combination of tart fruit and dark sweetness, is reinforced by tannins binding to bitter receptor proteins on the palate.", "chemistry": "Key compounds: ethyl octanoate, 1-octanol, furfural (from oak)"}, "olive": {"cat": "Dried Fruit", "origin": "Black olive is a characteristic note of Grenache from Châteauneuf-du-Pape, Monastrell, and Mencia. It derives from esters of oleanolic acid and from ethyl phenolates formed during barrel aging. The olive impression signals oxidative development and high phenolic maturity in the grapes. It often accompanies leather and tobacco notes in wines intended for long aging.", "chemistry": "Key compounds: ethyl phenolates, oleanolic acid derivatives, aldehydes"}, "raisin": {"cat": "Dried Fruit", "origin": "Raisin aromas arise in wines made from dried grapes (Amarone, Recioto, Passito) or in very overripe harvests. The concentration of volatile compounds—beta-damascenone, furaneol, and Maillard-derived furfurals—combined with reduced water activity in raisined grapes creates intense sweetness and a cooked-fruit character. Raisin also appears as a fault note in wines suffering from excessive oxidation.", "chemistry": "Key compounds: furaneol, beta-damascenone, furfural, 5-hydroxymethylfurfural (5-HMF)"}, "fig": {"cat": "Dried Fruit", "origin": "Fig aromas appear in Grenache, Nero d'Avola, and southern Italian reds where warm temperatures concentrate phenolic compounds from fig-like secondary metabolites. Fresh fig contributes a milky, tropical note (from ficin and lactones); dried fig provides a more complex combination of furanones and caramelized sugars. Fig notes in wine often accompany a plush, rich texture from high glycerol.", "chemistry": "Key compounds: delta-decalactone, furaneol, benzyl alcohol"}, "date": {"cat": "Dried Fruit", "origin": "Date appears in the sweetest, most oxidative styles of wine—Pedro Ximénez Sherry, Vin Santo, and Australian Rutherglen Muscat. The compound sotolon (3-hydroxy-4,5-dimethyl-2(5H)-furanone) is central to date's distinctive caramelized-sweet aroma, also found in fenugreek and aged Sauternes. This same compound appears in botrytized wines and heavily fortified dessert styles.", "chemistry": "Key compounds: sotolon, 5-HMF, caramel-derived furanones"}, "fruitcake": {"cat": "Dried Fruit", "origin": "Fruitcake aromas—dense, spiced dried fruit mixed with alcohol—are classic in vintage Port, Amarone della Valpolicella, and Rutherglen Muscat. The combination of ethyl esters from dried fruit fermentation, oak-derived spice phenolics (eugenol, vanillin), oxidative aldehydes, and Maillard browning products creates this festive, rich aroma. High alcohol amplifies the volatile impression.", "chemistry": "Key compounds: eugenol, vanillin, furaneol, sotolon, branching ethyl esters"}, "prune": {"cat": "Dried Fruit", "origin": "Prune signals fully ripe or over-ripe red grapes—particularly in Grenache, Zinfandel, and Tempranillo from hot vintages. Prune character results from the thermal degradation of carotenoids and polyunsaturated fatty acids: beta-damascenone and its derivatives dominate, supported by cooked-fruit lactones and Maillard-derived furfurals. At very high concentrations, prune can become a fault marker.", "chemistry": "Key compounds: beta-damascenone, delta-octalactone, furfural"}, "saffron": {"cat": "Noble Rot", "origin": "Saffron aromas appear in wines made under warm, oxidative conditions—aged Grenache, some Pinot Gris vendange tardive, and Condrieu after bottle aging. The key saffron odorant safranal (2,6,6-trimethylcyclohexa-2,4-diene-1-carbaldehyde) forms from picrocrocin during oxidative aging. At trace concentrations it adds an exotic, honeyed-spice quality that elevates aromatic complexity.", "chemistry": "Key compounds: safranal, picrocrocin derivatives, beta-damascenone"}, "ginger": {"cat": "Noble Rot", "origin": "Ginger notes in wine derive from both natural grape compounds and noble rot (Botrytis cinerea) metabolites. In Sauternes, the 'noble rot' fungi produce glycerol and unique ketones that, combined with varietal terpenes from Sémillon and Sauvignon Blanc, create a spiced-honey complexity. Fresh ginger (zingerone, shogaols) is more rarely cited—more often it is a dried ginger note from sotolon.", "chemistry": "Key compounds: sotolon, zingerone trace, glycerol esters"}, "honey": {"cat": "Noble Rot", "origin": "Honey is one of the most direct descriptors for wines affected by Botrytis cinerea—the beneficial mould that concentrates flavours in Sauternes, Tokaji, and German Auslesen. Sotolon (described as honey, fenugreek, curry) is the primary botrytis ketone. Phenylacetaldehyde, formed from amino acid degradation, contributes a honey/rose hybrid note. Residual sugars amplify the impression.", "chemistry": "Key compounds: sotolon, phenylacetaldehyde, glycerol"}, "beeswax": {"cat": "Noble Rot", "origin": "Beeswax is a tertiary note in aged sweet whites—particularly old Sauternes, late-harvest Chenin Blanc (Quarts de Chaume), and aged Tokaji Aszú. The waxy quality comes from long-chain fatty acid esters and aldehydes that evolve during extended bottle aging. At very high Brix, grape-derived terpenes and lactones blend into a complex, honeyed-wax character indistinguishable from old combs.", "chemistry": "Key compounds: long-chain fatty acid esters, palmitaldehyde, gamma-dodecalactone"}, "white-pepper": {"cat": "Spice", "origin": "White pepper is the signature note of Grüner Veltliner and also appears in cool-climate Syrah, Mourvèdre, and Schioppettino. The key compound in white pepper is rotundone, but in Grüner Veltliner the compound responsible is more closely related to sesquiterpenes and pepper esters from the grape's own aromatic profile.", "chemistry": "Key compounds: rotundone (sesquiterpene), limonene, terpenyl esters"}, "red-pepper": {"cat": "Spice", "origin": "Red/chili pepper aromas in wine are linked to capsaicin analogs and rotundone. In Syrah/Shiraz, particularly from cool climates like the Yarra Valley and Northern Rhône, rotundone—a sesquiterpene—is responsible for the characteristic black and white pepper/red pepper spice. At low thresholds, rotundone is intensely perceived even by tasters without specific anosmia.", "chemistry": "Key compounds: rotundone, capsaicin derivatives (trace)"}, "black-pepper": {"cat": "Spice", "origin": "Black pepper is the signature aromatic note of Syrah/Shiraz worldwide—most potently in Northern Rhône Syrah, Grüner Veltliner, and some Mourvèdre-dominant wines. The single compound responsible, rotundone, was identified as recently as 2008. It concentrates in the skins of grapes grown at cooler temperatures or at higher elevations, explaining why Crozes-Hermitage shows more pepper than warm-climate Australian Shiraz.", "chemistry": "Key compounds: rotundone (alpha-guaiene oxidation product)"}, "cinnamon": {"cat": "Spice", "origin": "Cinnamon aromas in wine come from oak-derived cinnamaldehyde and trans-cinnamic acid, both of which are naturally present in the wood and released when wood is toasted. Wines aged in medium-plus or heavy-toast barrels—whether Cabernet, Rioja Tempranillo, or oaked Chardonnay—develop cinnamon alongside vanilla and baking spice notes that indicate barrel integration.", "chemistry": "Key compounds: cinnamaldehyde, trans-cinnamic acid, eugenol (oak-derived)"}, "anise": {"cat": "Spice", "origin": "Anise/licorice aromas appear in Syrah, Tannat, Carménère, and aged Nebbiolo. The primary compounds—trans-anethole and estragole—are present in grape-derived terpene fractions. Carménère from Chile shows a particularly pronounced green anise character from methoxypyrazines and terpene esters. In aged Barolo, dried anise notes develop from the oxidative evolution of its terpene pool.", "chemistry": "Key compounds: trans-anethole, estragole, foeniculin"}, "asian-5-spice": {"cat": "Spice", "origin": "Asian 5-spice—cinnamon, star anise, cloves, Szechuan pepper, fennel—is a complex descriptor for wines with multilayered oak and fruit spice. It appears in heavily oaked Syrah, Zinfandel, and Spanish Garnacha blends. The combination of eugenol (cloves, from oak), rotundone (Szechuan pepper), trans-anethole (anise/fennel), and cinnamaldehyde (cinnamon) describes wines with impressive spice complexity.", "chemistry": "Key compounds: eugenol, rotundone, trans-anethole, cinnamaldehyde"}, "fennel": {"cat": "Spice", "origin": "Fennel aromas appear in Carménère, Sangiovese, and Vermentino. Like anise, fennel derives its characteristic scent from trans-anethole and fenchone. In Southern French blends containing Grenache and Mourvèdre, wild fennel grows throughout the garrigue, contributing to what some consider a regional aromatic character—though direct garrigue-to-wine compound transfer has not been conclusively proven.", "chemistry": "Key compounds: trans-anethole, fenchone, limonene"}, "eucalyptus": {"cat": "Spice", "origin": "Eucalyptus is a defining note of Coonawarra Cabernet Sauvignon and some Napa Valley Cabernets. For years a mystery, the compound 1,8-cineole (eucalyptol) has been confirmed both in eucalyptus leaves growing near vineyards and in the wines from those sites. Leaves can contaminate harvested fruit physically, but terpene volatilization in warm conditions may also contribute to vineyard absorption.", "chemistry": "Key compounds: 1,8-cineole (eucalyptol), alpha-pinene"}, "mint": {"cat": "Spice", "origin": "Mint appears in cool-climate Cabernet Sauvignon, Merlot, and Carménère. Menthol and menthenol isomers are the primary mint compounds, often accompanied by herbal methoxypyrazines. High-elevation Napa and Coonawarra Cabernets can show a fresh mint lift that integrates with black currant and cedar in classic claret-style wines. Excessive mint may indicate unripe tannins alongside the herbal notes.", "chemistry": "Key compounds: menthol, neomenthol, methyl salicylate"}, "thyme": {"cat": "Spice", "origin": "Thyme belongs to the 'garrigue' family of herbs associated with Southern Rhône wines—Châteauneuf-du-Pape blends, Pic Saint-Loup, and Corbières. Thymol and carvacrol, the dominant phenolic monoterpenes in thyme oil, can be detected in wines from vineyards close to wild thyme scrub. Grenache varieties seem particularly capable of expressing these Mediterranean herb characters.", "chemistry": "Key compounds: thymol, carvacrol, p-cymene"}, "grass": {"cat": "Vegetable", "origin": "Freshly cut grass is a primary aroma of young Sauvignon Blanc and unoaked Verdejo. The compound cis-3-hexenol and its acetate (cis-3-hexenyl acetate) are the classic 'green' compounds produced when plant cells are damaged—in wine, they arise from the enzymatic breakdown of polyunsaturated fatty acids in grape skins during crushing. Very high levels indicate underripe grapes or excessive maceration.", "chemistry": "Key compounds: cis-3-hexenol, cis-3-hexenyl acetate, hexanal"}, "tomato-leaf": {"cat": "Vegetable", "origin": "Tomato leaf is a descriptor for Loire Sauvignon Blanc, New Zealand Sauvignon, and Grüner Veltliner at below-optimal ripeness. The aromatic compound responsible is 2-isobutyl-3-methoxypyrazine—a methoxypyrazine produced in grape berries and leaves when vines are stressed or harvested underripe. The descriptor is vegetal-aromatic and usually acceptable in small doses; at high concentrations it becomes a fault.", "chemistry": "Key compounds: 2-isobutyl-3-methoxypyrazine (IBMP), cis-3-hexenol"}, "gooseberry": {"cat": "Vegetable", "origin": "Gooseberry is one of Sauvignon Blanc's most beloved aromas—crisp, tart, green-tinged, and vibrant. It is primarily produced by the volatile thiol 3-mercaptohexanol (3MH) in combination with methoxypyrazines and cis-3-hexenol. Classic Loire Sancerre and Pouilly-Fumé show sharp gooseberry alongside flint, while Marlborough Sauvignon tilts this toward tropical guava at higher 3MH concentrations.", "chemistry": "Key compounds: 3-mercaptohexanol (3MH), 2-isobutyl-3-methoxypyrazine (IBMP)"}, "bell-pepper": {"cat": "Vegetable", "origin": "Green bell pepper (capsicum) is a direct marker for methoxypyrazines—specifically 3-isobutyl-2-methoxypyrazine (IBMP)—produced in Cabernet Sauvignon, Cabernet Franc, Carménère, and Sauvignon Blanc. Some bell pepper character is desirable in classic Médoc reds, lending complexity to blackcurrant fruit. At high concentrations it indicates insufficient ripeness and can overpower varietal fruit expression.", "chemistry": "Key compounds: 3-isobutyl-2-methoxypyrazine (IBMP), 2-isopropyl-3-methoxypyrazine (IPMP)"}, "jalapeno": {"cat": "Vegetable", "origin": "Jalapeño—a green-herbaceous, slightly fiery character—is found in Cabernet Franc and Carménère at sub-optimal ripeness, and can appear in Malbec from cooler vineyard sites. Methoxypyrazines drive this descriptor, but the warming sensation is attributed to trace phenolic compounds. Carménère is particularly prone to jalapeño character in partially shaded or poorly drained vineyard blocks.", "chemistry": "Key compounds: 3-isobutyl-2-methoxypyrazine, trace capsaicin analogs"}, "tomato": {"cat": "Vegetable", "origin": "Tomato—fresh, tart, and slightly savory—is associated with Sangiovese (Chianti), Dolcetto, and some Grenache. The flavour derives from a combination of hexanal, trans-2-hexenal, and guaiacol, which create a cooked-tomato/bruised-tomato character often described in wines with high acidity and rustic tannins. Sangiovese's natural high-acid, moderate-fruit profile frequently draws this comparison.", "chemistry": "Key compounds: hexanal, trans-2-hexenal, guaiacol"}, "sun-dried-tomato": {"cat": "Vegetable", "origin": "Sun-dried tomato aromas—concentrated, sweet-savory, and umami-rich—arise in Sangiovese-based wines at high maturity (Brunello di Montalcino, Rosso di Montalcino). The drying process concentrates glutamic acid (umami) and Maillard products alongside lycopene carotenoid derivatives. In Amarone, partially dried Corvina grapes develop a similar cooked, concentrated tomato quality during the appassimento.", "chemistry": "Key compounds: 2-isobutylthiazole, Maillard-derived furanones, lycopene oxidation products"}, "black-tea": {"cat": "Vegetable", "origin": "Black tea aromas in wine signal the presence of tea-polyphenols (theaflavins and thearubigins analogs) derived from oxidized grape tannins after long barrel and bottle aging. Aged Nebbiolo wines like Barolo often evoke damp tea leaves or oolong alongside leather and dried rose. Theanine, the amino acid in green tea, is also found in wine at trace levels and may contribute to savory balance.", "chemistry": "Key compounds: theaflavin analogs (oxidized tannins), theanine (trace), gallic acid"}, "clay-pot": {"cat": "Vegetable", "origin": "Clay pot or terra cotta aromas—earthy, mineral, slightly dusty—are associated with wines from regions with clay-heavy soils (Pomerol, Pauillac, parts of Chianti) or wines fermented and aged in amphorae. The mineral character is partly from geosmin and related microbial metabolites absorbed from clay surfaces, giving wines a distinctive cool-earth and fresh-mineral quality.", "chemistry": "Key compounds: geosmin (trace), 2-methylisoborneol, mineral metal ions"}, "slate": {"cat": "Earth", "origin": "Slate or 'wet stone' is one of wine's most debated and prized mineral characters—most associated with Riesling from the Mosel, where vineyards are planted on blue and grey Devonian slate. While direct transmission of mineral flavors from soil to wine remains contested, slate-grown Riesling reliably shows a cool, metallic, petrichor-like note that may derive from hydrogen sulfide at sub-threshold concentrations and TDN (petroleum compound).", "chemistry": "Key compounds: hydrogen sulfide (sub-threshold), TDN (trimethyl-dihydronaphthalene), petrichor-related aldehydes"}, "wet-gravel": {"cat": "Earth", "origin": "Wet gravel or 'crushed wet stone' is a marker of Graves and Pessac-Léognan Cabernet Sauvignon and is associated with the deep, well-draining gravel terroir of the Left Bank Bordeaux. Mineral characters are likely produced during fermentation when reductive sulfur chemistry and aldehydes from fatty acid oxidation create a cold, fresh stone impression. Iron-chelating tannins may also contribute.", "chemistry": "Key compounds: aldehydes (from lipid oxidation), sub-threshold hydrogen sulfide, iron-tannin complexes"}, "potting-soil": {"cat": "Earth", "origin": "Potting soil or 'damp earth' is a characteristic note of Burgundian Pinot Noir and Nebbiolo from the Langhe. Geosmin—the compound responsible for the smell of rain on dry earth (petrichor)—is produced by Streptomyces bacteria present in the vineyard. At sub-threshold concentrations geosmin adds terroir complexity; at higher levels it indicates microbial vine disease or grape rot.", "chemistry": "Key compounds: geosmin, 2-methylisoborneol (MIB), earthy sesquiterpenes"}, "red-beet": {"cat": "Earth", "origin": "Red beet aromas in wine—earthy, sweet-rooty, and slightly mineralic—are associated with Pinot Noir, Grenache, and Gamay, especially from volcanic or iron-rich soils. Geosmin and betanin-related compounds contribute to the beet impression. Some tasters detect this note in Chambolle-Musigny Pinot Noir, where it combines with red berry fruit and forest floor in a complex whole.", "chemistry": "Key compounds: geosmin, betanin derivatives (anthocyanin analogs), iron-bound tannins"}, "volcanic-rocks": {"cat": "Earth", "origin": "Volcanic or 'lava rock' aromas are associated with wines from volcanic terroirs: Etna Rosso (Sicily), Santorini Assyrtiko, Canary Islands Listán Negro, and Tenerife's indigenous varieties. The mineral-smoky, ashy character may derive from specific organic sulfur compounds formed when roots interact with basaltic mineral compounds, as well as from the low-pH, high-mineral soil chemistry typical of volcanic sites.", "chemistry": "Key compounds: methional, 3-methylbutanal, sulfur-derived volatiles (origin debated)"}, "petroleum": {"cat": "Earth", "origin": "Petrol or petroleum is one of Riesling's most controversial yet prized aromatic notes, appearing with age in wines from the Mosel, Alsace, Clare Valley, and Eden Valley. The compound responsible is TDN (1,1,6-trimethyl-1,2-dihydronaphthalene), formed from the degradation of carotenoids during bottle aging. Warm vintages and high sugar levels at harvest accelerate TDN formation, as does excess exposure to sunlight.", "chemistry": "Key compounds: TDN (1,1,6-trimethyl-1,2-dihydronaphthalene), norisoprenoids"}, "butter": {"cat": "Microbial", "origin": "Butter is the quintessential note of malolactic fermentation (MLF) in Chardonnay. Diacetyl—produced by lactic acid bacteria as they convert sharp malic acid to softer lactic acid—is the key compound. At 1–4 mg/L diacetyl creates a creamy richness; above 5 mg/L it becomes an obvious butter fault. Classic California Chardonnay of the 1990s was associated with strong diacetyl character from full, inoculated MLF.", "chemistry": "Key compounds: diacetyl (2,3-butanedione), acetoin"}, "cream": {"cat": "Microbial", "origin": "Cream—a softer, richer version of butter—arises in white wines with prolonged lees contact (sur lie aging). Yeast autolysis releases fatty acids, sterols, and mannoproteins that coat the palate and give a creamy texture. Acetoin (the precursor to diacetyl) and ethyl lactate from malolactic fermentation contribute subtle cream character without the directness of full diacetyl production.", "chemistry": "Key compounds: acetoin, ethyl lactate, mannoproteins (lees-derived)"}, "sourdough": {"cat": "Microbial", "origin": "Sourdough or 'bready-yeasty' aromas are classic in Champagne and other traditional method sparkling wines after extended lees contact (autolysis). When dead yeast cells break down, they release a suite of amino acids, fatty acids, and nucleotides—including compounds responsible for toasted bread character: acetaldeyhde, isoamyl acetate at trace levels, and thiamine-derived Maillard products.", "chemistry": "Key compounds: acetaldehyde (trace), isoamyl acetate (trace), thiamine Maillard products"}, "lager": {"cat": "Microbial", "origin": "Lager or 'beer-like' aromas in wine indicate the presence of volatile sulfur compounds and diethyl sulfide from stressed fermentation, or indicate that DMS (dimethyl sulfide) has been produced during lees aging. DMS at 10–50 μg/L gives a corn/sweet, light-beer character and is found in many wines. At higher concentrations in sparkling wines it is considered a minor flaw but adds complexity in some aged blanc de blancs.", "chemistry": "Key compounds: dimethyl sulfide (DMS), diethyl sulfide, acetaldehyde"}, "truffle": {"cat": "Microbial", "origin": "Truffle is one of Burgundy Pinot Noir's most coveted tertiary aromas, appearing in aged Gevrey-Chambertin, Vosne-Romanée, and Chambolle-Musigny. The truffle note comes from 2,4-dithiapentane (bis(methylthio)methane)—a volatile sulfide also found in black Périgord truffles—produced during bottle reduction. Dimethyl sulfide at moderate concentrations also contributes to this earthy, fungal impression.", "chemistry": "Key compounds: 2,4-dithiapentane, dimethyl sulfide (DMS), methional"}, "mushroom": {"cat": "Microbial", "origin": "Mushroom or forest floor aromas—damp, earthy, fungal—are associated with aged Pinot Noir, old-vine Grenache, and wines from clay or limestone terroirs. 1-Octen-3-ol (mushroom alcohol), produced by fungi in the vineyard and during reductive winemaking, is the primary compound. Low levels of geosmin and 2-methylisoborneol amplify the fungal-earthy impression. In Barolo, mushroom integrates with tar and roses.", "chemistry": "Key compounds: 1-octen-3-ol, 2-methylisoborneol (MIB), geosmin"}, "vanilla": {"cat": "Oak Aging", "origin": "Vanilla is the most universally recognised signature of oak barrel aging, derived from vanillin—a phenolic aldehyde naturally present in oak lignin and released when wood is toasted. American oak (Quercus alba) contains 3–5× more vanillin than French oak (Quercus petraea or sessiliflora), explaining why US-oaked Chardonnay and Rioja aged in American barriques show more prominent vanilla than their French-oaked counterparts.", "chemistry": "Key compounds: vanillin (oak-derived), ethyl vanillin, acetovanillone"}, "coconut": {"cat": "Oak Aging", "origin": "Coconut is a hallmark of American oak barrel aging, arising from whiskey-lactone (beta-methyl-gamma-octalactone)—a compound found in much higher concentrations in Quercus alba than in European oak species. American-oaked Rioja Reserva, Napa Chardonnay aged in Missouri oak, and Australian Shiraz in American barrels typically exhibit pronounced coconut alongside vanilla. The lactone is released through the toast process.", "chemistry": "Key compounds: cis-beta-methyl-gamma-octalactone (whiskey lactone), delta-valerolactone"}, "baking-spices": {"cat": "Oak Aging", "origin": "Baking spices (cinnamon, nutmeg, clove, allspice) are released from the oak's spice wood compounds during barrel toasting. Medium-plus toast amplifies these notes. Eugenol (cloves), cinnamaldehyde (cinnamon), and beta-methyl-gamma-octalactone (coconut) combine to give the baking-spice complexity typical of full-bodied oaked reds: Rioja Gran Reserva, Napa Cabernet, and Australian Barossa Shiraz.", "chemistry": "Key compounds: eugenol, cinnamaldehyde, vanillin, guaiacol (oak-derived)"}, "cigar-box": {"cat": "Oak Aging", "origin": "Cigar box is a classic tertiary note in aged Cabernet Sauvignon, particularly from the Médoc (Pauillac, Saint-Estèphe) and Napa Valley. The aroma combines cedar wood, dried tobacco, leather, and pencil shavings. Cedar lactones, guaiacol, and benzaldehyde from oak aging interact with grape-derived polyphenols to create this dry, aromatic impression that defines 'classic claret' to many tasters.", "chemistry": "Key compounds: alpha-cedrol, cedrene, guaiacol, beta-eudesmol (cedar wood compounds)"}, "smoke": {"cat": "Oak Aging", "origin": "Smoke aromas can arise from several sources in wine: barrel toast (guaiacol and 4-methylguaiacol), wildfire smoke during the growing season (smoke taint—syringol, guaiacol derivatives), and reductive aging in bottle. Smoke taint from wildfires is a growing concern in wine regions including California, Oregon, Victoria, and Chile, as smoke compounds bind to glycosides in grape skins and are later liberated during fermentation.", "chemistry": "Key compounds: guaiacol, 4-methylguaiacol, syringol (smoke taint or oak-derived)"}, "dill": {"cat": "Oak Aging", "origin": "Dill is a specific note associated with American oak (Quercus alba) aging, caused by the compound 1,8-cineole (eucalyptol) and trans/cis isomers of beta-methyl-gamma-octalactone. White oak grown in Missouri and the Ozarks has particularly high levels of these compounds. Dill can be pleasant in small doses in Zinfandel and American-oaked Rioja, but at high levels can seem out of place in a finely structured wine.", "chemistry": "Key compounds: 1,8-cineole, cis/trans-beta-methyl-gamma-octalactone"}, "nuts": {"cat": "General Aging", "origin": "Nuts—walnut, hazelnut, almond—arise in oxidatively aged wines: Oloroso and Amontillado Sherry, aged white Burgundy, and mature Pinot Gris from Alsace. Benzaldehyde provides the almond note; oxidized fatty acids produce walnut and rancio character. Extended lees contact in reductive styles allows glutamic acid to build, adding savory, umami-nut complexity to aged Champagne and quality Chablis.", "chemistry": "Key compounds: benzaldehyde (almond), oxidized fatty acid esters, glutamic acid"}, "tobacco": {"cat": "General Aging", "origin": "Tobacco aromas—dried leaf, cured tobacco, latakia—appear in aged Bordeaux, Rioja Gran Reserva, and Amarone after many years in bottle. The compounds include pyrazines from grape skin phenolics, furfural from oak, and complex heterocyclic compounds produced during Maillard reactions in warm cellars. Tobacco often accompanies cedar, leather, and coffee in a classic 'cellar-aged' aromatic profile.", "chemistry": "Key compounds: furfural, methylpyrazines, cured tobacco heterocyclics"}, "coffee": {"cat": "General Aging", "origin": "Coffee aromas come from two primary sources in wine: heavy oak toast and extended bottle aging of polyphenol-rich reds. Heavily toasted barrels release furfuryl methyl ketone and guaiacol—direct coffee-roast compounds. In aged Syrah, Amarone, and Sagrantino from Montefalco, the combination of oak-derived and phenolic oxidation products builds toward espresso intensity without sweetness.", "chemistry": "Key compounds: furfuryl methyl ketone, guaiacol, 2-furfuryl alcohol (oak/Maillard)"}, "cocoa": {"cat": "General Aging", "origin": "Cocoa or dark chocolate aromas are found in Malbec, Syrah, Zinfandel, and Cabernet with ripe tannins and oak integration. Theobromine-related compounds, methylpyrazines from oak, and high molecular-weight tannins mimic the bittersweet quality of dark chocolate. The cocoa note is most prominent when polyphenols have softened through prolonged aging and the fruit profile has dried toward raisin and dried cherry.", "chemistry": "Key compounds: methylpyrazines, theobromine analogs (trace), oak-derived phenolics"}, "leather": {"cat": "General Aging", "origin": "Leather is one of wine's most evocative tertiary aromas—classic in aged Barolo, Rioja, and Bordeaux. The primary source is isobutyric acid and isovaleric acid from microbial activity, combined with phenolic-derived compounds (cresol, guaiacol) from barrel aging. Brett-related leather has a more animal, sweaty quality; purely aged leather is drier and more refined. It signals significant bottle time.", "chemistry": "Key compounds: isobutyric acid, guaiacol, 4-ethylguaiacol, cresol"}, "musty-cardboard": {"cat": "TCA · Cork Taint", "origin": "Musty cardboard, sometimes called damp newspaper, is the signature of TCA contamination (cork taint). 2,4,6-Trichloroanisole (TCA) is produced by Penicillium fungi converting chlorinated compounds in cork into their anisole form—a potent aroma suppressor. Even at 4–6 parts per trillion, TCA dulls all aromas and adds a musty, damp basement quality. Natural cork remains TCA's primary vector.", "chemistry": "Key compounds: 2,4,6-trichloroanisole (TCA), 2,3,4,6-tetrachloroanisole (TeCA)"}, "wet-dog": {"cat": "TCA · Cork Taint", "origin": "Wet dog is a classic fault note associated with either TCA cork taint or high levels of 4-ethylphenol from Brettanomyces yeast. It is distinctive and unpleasant, suggesting a poorly maintained wine. At sub-fault threshold levels, some tasters perceive this as part of the 'farmyard' character associated with Burgundy and Châteauneuf-du-Pape, though this remains controversial.", "chemistry": "Key compounds: 4-ethylphenol (Brett), TCA derivatives, skatole (trace)"}, "cured-meat": {"cat": "Brettanomyces", "origin": "Cured meat, salami, or charcuterie notes can arise from Brettanomyces yeast metabolites—particularly 4-ethylphenol and 4-ethylguaiacol—in reds aged under poor cellar hygiene conditions. At sub-fault concentrations, these notes can add savoury complexity appreciated in Rhône blends and old Rioja. A classic Châteauneuf-du-Pape often has a subtle meat character from Brettanomyces contribution.", "chemistry": "Key compounds: 4-ethylphenol, 4-ethylguaiacol (Brettanomyces)"}, "burnt-rubber": {"cat": "Reduction", "origin": "Burnt rubber is a sulfur-based fault aroma from diethyl sulfide and thiophene compounds produced during reductive winemaking. It is more common in screw-capped wines aging in very reducing conditions or in wines made without adequate oxygen management. In very small amounts, reductive sulfur can contribute a flint or gunsmoke character rather than outright rubber.", "chemistry": "Key compounds: diethyl sulfide, dimethyl disulfide (DMDS), thiophene derivatives"}, "match-box": {"cat": "Reduction", "origin": "Match box or struck-match aromas signal reductive winemaking conditions—the presence of free SO₂ or hydrogen sulfide at low concentrations. This note is common in young Sauvignon Blanc from Marlborough stored under screwcap, and in early stages of tasting Champagne. The aroma typically blows off with decanting or swirling as the compound volatilizes in the glass.", "chemistry": "Key compounds: SO₂ (sulfur dioxide), hydrogen sulfide (H₂S), dimethyl sulfide (DMS)"}, "onion": {"cat": "Reduction", "origin": "Onion or garlic fault notes indicate the presence of allyl mercaptans, propanethiol, and diallyl disulfide—sulfur compounds related to poor grape hygiene, winemaking under excessive reduction, or sulfur vineyard spray residues. These aromas are generally considered faults but in trace concentrations in wines like Pouilly-Fumé and Muscadet they contribute to a characteristic 'flinty' reduction.", "chemistry": "Key compounds: allyl mercaptan, propanethiol, diallyl disulfide"}, "cat-pee": {"cat": "Reduction", "origin": "Cat pee is the high-concentration manifestation of 4-mercapto-4-methylpentan-2-one (4MMP)—the same thiol that at lower levels creates blackcurrant in Sauvignon Blanc. This fault is most common in poorly fermented or poorly maintained Sauvignon Blanc. Temperature abuse, reductive storage failure, and very high skin contact can trigger excessive 4MMP accumulation, tipping the wine past cassis into frank cat box character.", "chemistry": "Key compounds: 4-mercapto-4-methylpentan-2-one (4MMP) at fault concentration"}, "band-aid": {"cat": "Brettanomyces", "origin": "Band-Aid (adhesive plaster) aroma is a marker of Brettanomyces contamination—specifically 4-ethylphenol and 4-ethylguaiacol produced by Dekkera/Brett yeast feeding on p-coumaric acid and ferulic acid from grape tannins. While some consider trace Brett complexity desirable in old-world reds, a clear band-aid note indicates excessive Brett activity that masks fruit expression.", "chemistry": "Key compounds: 4-ethylphenol, 4-ethylguaiacol (Brettanomyces metabolites)"}, "sweaty-leather": {"cat": "Brettanomyces", "origin": "Sweaty leather is an evocative description for the combination of isovaleric acid (sweaty feet), 4-ethylphenol (barnyard), and isobutyric acid (rancid butter). This complex of microbial fermentation byproducts—primarily from Brettanomyces—is most frequently found in old-school Burgundy, some Rhône blends, and unfiltered Spanish wines. High-Brett expressions are divisive: prized by some as authentic terroir, condemned by others as spoilage.", "chemistry": "Key compounds: isovaleric acid, isobutyric acid, 4-ethylphenol"}, "horse-barnyard": {"cat": "Brettanomyces", "origin": "Horse/barnyard is the archetypal Brett descriptor—a combination of 4-ethylphenol (phenolic, horse stable) and 4-ethylguaiacol (smoky, spicy, band-aid). Brettanomyces bruxellensis/Dekkera yeast thrives in the pores of oak barrels and at cellar humidity. Wines most susceptible include those from naturally low-SO₂ winemaking, old barrels, and low-acid, high-pH reds—particularly Grenache and Merlot.", "chemistry": "Key compounds: 4-ethylphenol (4EP), 4-ethylguaiacol (4EG) (Brettanomyces)"}, "toffee": {"cat": "Oxidation & Heat", "origin": "Toffee aromas—buttery caramel with a slight bitter edge—appear in wines with volatile acidity elevation, oxidative influences, or in cooked/stewed fruit situations. Acetaldehyde, diacetyl, and furfural combine at elevated concentrations (from poor cellar management or deliberately from appassimento) to yield toffee and caramel notes. In PX Sherry, toffee is considered an intrinsic and welcome feature.", "chemistry": "Key compounds: diacetyl (high concentration), furfural, acetaldehyde"}, "barnyard": {"cat": "Brett/Mousiness", "origin": "Barnyard encompasses the classic Brettanomyces character—4-ethylphenol provides the dry horse/phenolic quality; 4-ethylguaiacol adds a spicy-smoky dimension. This combination is most associated with Burgundy, Southern Rhône, and unfiltered Spanish wines aged in poorly maintained oak. The debate about whether 'terroir Brett' is an asset or a flaw remains unresolved in serious wine circles.", "chemistry": "Key compounds: 4-ethylphenol, 4-ethylguaiacol (Brettanomyces/Dekkera)"}, "balsamic": {"cat": "Volatile Acidity", "origin": "Balsamic aromas—sweet-sour, aromatic, concentrated—arise in wines with elevated volatile acidity where acetic acid has transformed into ethyl acetate and acetaldehyde, contributing a sweet-sharp complexity. In Italian wine culture, a slight balsamic note in Chianti Classico Riserva or Brunello is traditional and acceptable. Modern production standards have pushed these levels lower in export wines.", "chemistry": "Key compounds: ethyl acetate, acetic acid, acetaldehyde"}, "vinegar": {"cat": "Volatile Acidity", "origin": "Vinegar (acetic acid at >1.2 g/L) is the primary volatile acidity fault, produced by acetic acid bacteria (Acetobacter) when oxygen reaches fermented wine. Small amounts of volatile acidity (below 0.7 g/L acetic acid) add complexity; above 1.4 g/L it is considered a legal fault. White wine has a lower tolerance than red—the same level reads as sharper and more disruptive against a less tannic background.", "chemistry": "Key compounds: acetic acid (principal), ethyl acetate (secondary)"}, "stewed-fruit": {"cat": "Oxidation & Heat", "origin": "Stewed fruit—cooked, jammy, dulled stone or red fruit character—appears in wines that have experienced heat damage, premature oxidation, or excess volatile acidity. The culprit is typically ethyl acetate masking fresh varietal esters, combined with furfural and 5-HMF from Maillard reactions. Stewed fruit can also describe legitimately warm vintages where heat stress concentrates sugars before full flavour development.", "chemistry": "Key compounds: ethyl acetate, furfural, 5-HMF, beta-damascenone (at cooked concentration)"}, "dried-fruit": {"cat": "Bottle Age", "origin": "Dried fruit as a broad aging marker—raisin, fig, date, dried cherry—signals oxidative development in bottle or barrel. As fresh fruit esters fade, carotenoid-derived beta-damascenone, furaneol, and (in deliberately oxidative styles) sotolon move to the foreground. In tawny Port, old Rioja, and mature Amarone, this evolution is the goal; in a young table wine it can indicate premature oxidation (premox) or heat damage in transit.", "chemistry": "Key compounds: beta-damascenone, furaneol, sotolon (oxidative styles)"}, "roasted-eggs": {"cat": "Reduction (Sulfur)", "origin": "Roasted or boiled egg aromas indicate hydrogen sulfide (H₂S), produced by yeast during fermentation—most often when the must is deficient in assimilable nitrogen (low YAN) or when elemental sulfur spray residue is present on fruit. Light H₂S frequently blows off with vigorous swirling, splash decanting, or contact with a copper surface; persistent H₂S can evolve into far more stubborn mercaptans. This is a winemaking/reduction fault, not cork taint (TCA).", "chemistry": "Key compounds: hydrogen sulfide (H₂S); precursors: low YAN, elemental sulfur residue"}, "nail-box": {"cat": "Reduction", "origin": "Nail box or 'iron/metallic' aromas in wine suggest the presence of iron ions (Fe²⁺/Fe³⁺) in solution from vineyard equipment contact or old cellar fittings. Iron interacts with tannins and creates inky, ferrous impressions similar to sucking a penny. In very small quantities, ferrous character is associated with the mineral profile of wines from iron-rich terroirs like Pomerol.", "chemistry": "Key compounds: iron ions (Fe²⁺), iron-tannin complexes, phospho-iron compounds"}};

const HUB=["Mark's", "AROMA", "WHEEL", "2026"];

 en:{wheel:"Wheel",list:"List",size:"Wheel size",reset:"Reset",notes:"Tasting Notes",dock:"⤺ Dock",

 es:{wheel:"Rueda",list:"Lista",size:"Tamaño",reset:"Reiniciar",notes:"Notas de Cata",dock:"⤺ Acoplar",

};
let lang='en';
function t(k){return UI[lang][k];}
function tx(obj,field){if(!obj)return'';const v=lang==='es'&&obj[field+'_es']?obj[field+'_es']:obj[field];return v||'';}

const svg=document.getElementById('wheelSvg'),panel=document.getElementById('detailPanel'),detail=document.getElementById('detailContent');
const TWO_PI=Math.PI*2;let rotation=0,isDragging=false,lastAngle=0,velocity=0,lastTime=0,animFrame=null,selectedPath=null,currentSlug=null;

/* theme */
const themeBtn=document.getElementById('themeBtn');
function setTheme(th){document.documentElement.setAttribute('data-theme',th);themeBtn.textContent=th==='dark'?'☀':'☾';try{localStorage.setItem(SUBJECT+'Theme',th);}catch(e){}}

themeBtn.addEventListener('click',()=>setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark'));

/* lang */
const langBtn=document.getElementById('langBtn');
function setLang(l){lang=l;langBtn.textContent=l==='en'?'ES':'EN';try{localStorage.setItem(SUBJECT+'Lang',l);}catch(e){}applyUIStrings();renderLabels();rebuildList();if(currentSlug)showDetail(currentSlug);}
(function(){let l=null;try{l=localStorage.getItem(SUBJECT+'Lang');}catch(e){}lang=l==='es'?'es':'en';langBtn.textContent=lang==='en'?'ES':'EN';})();
