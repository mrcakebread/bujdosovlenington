<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wine Aroma & Flavor Wheel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Georgia,serif;background:#1a1008;color:#f5e6c8;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
h1{font-size:1.4rem;font-weight:400;letter-spacing:0.15em;text-transform:uppercase;color:#c9a96e;padding:1.2rem 0 0.3rem;text-align:center;}
.subtitle{font-size:0.75rem;color:#8a6b3a;letter-spacing:0.1em;margin-bottom:0.8rem;text-align:center;}
.layout{display:flex;gap:0;width:100%;max-width:1100px;align-items:flex-start;padding:0 1rem 2rem;}
.wheel-wrap{flex:0 0 auto;display:flex;justify-content:center;}
#wheelSvg{cursor:grab;user-select:none;touch-action:none;}
#wheelSvg:active{cursor:grabbing;}
.detail-panel{flex:1;min-width:260px;max-width:380px;background:#231508;border:1px solid #5a3a1a;border-radius:12px;padding:1.4rem 1.6rem;margin-left:1.5rem;min-height:360px;transition:opacity 0.3s;}
.detail-panel h2{font-size:1.3rem;color:#e8c97e;margin-bottom:0.3rem;font-weight:400;font-style:italic;}
.detail-panel .category-tag{font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;color:#8a6b3a;margin-bottom:1rem;}
.detail-panel .body{font-size:0.88rem;line-height:1.75;color:#d4c0a0;}
.detail-panel .compound{margin-top:1rem;padding-top:0.8rem;border-top:1px solid #3a2510;font-size:0.78rem;color:#a08050;line-height:1.6;}
.detail-panel .compound strong{color:#c9a96e;font-style:normal;}
.detail-panel .producers-section{margin-top:1rem;padding-top:0.8rem;border-top:1px solid #3a2510;}
.detail-panel .producers-title{font-size:0.75rem;color:#c9a96e;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:0.4rem;font-weight:bold;}
.detail-panel .producers-list{display:flex;flex-wrap:wrap;gap:0.4rem;}
.detail-panel .producer-badge{font-size:0.75rem;background:#321e0b;border:1px solid #6b4c2b;color:#e8c97e;padding:0.2rem 0.5rem;border-radius:4px;}
.hint{font-size:0.78rem;color:#5a4020;text-align:center;margin-top:0.5rem;font-style:italic;}
.spin-hint{font-size:0.72rem;color:#4a3015;text-align:center;margin-bottom:0.5rem;letter-spacing:0.08em;}
@media(max-width:700px){
  .layout{flex-direction:column;align-items:center;}
  .detail-panel{margin-left:0;margin-top:1rem;width:100%;max-width:95vw;}
  h1{font-size:1.1rem;}
}
</style>
</head>
