.wheel-wrap {

#wheelSvg {

}

.detail-panel h2 {

    color: #e8c97e;
    margin-bottom: 0.2rem;
    font-weight: 400;
    font-style: italic;

.detail-panel .association-tag {

}

.detail-panel .section-title {

    color: #d4c0a0;
    margin-bottom: 0.8rem;
}

.detail-panel .highlight {
    color: #e8c97e;
}

.spin-hint {
    font-size: 0.72rem;
    color: #4a3015;
    text-align: center;
    margin-bottom: 0.5rem;
    letter-spacing: 0.08em;
}

@media(max-width:1180px){  
    .layout{flex-direction:column;align-items:center;}  
    .detail-panel{margin-left:0;margin-top:1rem;width:100%;max-width:95vw;}  
    h1{font-size:1.1rem;}

const svg = document.getElementById('wheelSvg');
const detail = document.getElementById('detailPanel');
const TWO_PI = Math.PI * 2;

let rotation = 0;
let isDragging = false;
let lastAngle = 0;
let velocity = 0;
let lastTime = 0;
let animFrame = null;

function polarToCart(cx, cy, r, angle) {
    return [cx + r * Math.cos(angle), cy + r * Math.sin(angle)];
}

function describeArcRing(r1, r2, startAngle, endAngle) {
    const [sx1, sy1] = polarToCart(0, 0, r1, startAngle);
    const [ex1, ey1] = polarToCart(0, 0, r1, endAngle);
    const [sx2, sy2] = polarToCart(0, 0, r2, startAngle);
    const [ex2, ey2] = polarToCart(0, 0, r2, endAngle);
    const large = endAngle - startAngle > Math.PI ? 1 : 0;
    return `M ${sx1} ${sy1} A ${r1} ${r1} 0 ${large} 1 ${ex1} ${ey1} L ${ex2} ${ey2} A ${r2} ${r2} 0 ${large} 0 ${sx2} ${sy2} Z`;
}

function generateSegmentColor(angle) {
    const deg = (angle * 180 / Math.PI + 360) % 360;
    return `hsl(${deg}, 45%, 42%)`;
}

function buildWheelGeometry() {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('id', 'wheelG');

    const R_CENTER = 110;
    const R_TIER1 = 260;
    const R_TIER2 = 430;
    const R_TIER3 = 600;

    let totalOuterDescriptors = 0;
    WHEEL_DATA.forEach(div => {
        div.categories.forEach(cat => {
            cat.subs.forEach(sub => {
                totalOuterDescriptors += sub.descriptors.length;
            });
        });
    });

    const anglePerDescriptor = TWO_PI / totalOuterDescriptors;
    let runningDescriptorCount = 0;

    WHEEL_DATA.forEach((div, divIdx) => {
        let totalDivDescs = 0;
        div.categories.forEach(c => c.subs.forEach(s => totalDivDescs += s.descriptors.length));
        
        const divStartAngle = runningDescriptorCount * anglePerDescriptor - Math.PI/2;
        const divEndAngle = divStartAngle + (totalDivDescs * anglePerDescriptor);

        const divBoundary = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        divBoundary.setAttribute('d', describeArcRing(R_CENTER, R_TIER3, divStartAngle, divEndAngle));
        divBoundary.setAttribute('fill', 'none');
        divBoundary.setAttribute('stroke', divIdx === 0 ? '#c9a96e' : '#a63c3c');
        divBoundary.setAttribute('stroke-width', '2');
        g.appendChild(divBoundary);

        div.categories.forEach(cat => {
            let totalCatDescs = 0;
            cat.subs.forEach(s => totalCatDescs += s.descriptors.length);
            
            const catStartAngle = runningDescriptorCount * anglePerDescriptor - Math.PI/2;
            const catEndAngle = catStartAngle + (totalCatDescs * anglePerDescriptor);
            const catMidAngle = catStartAngle + (catEndAngle - catStartAngle) / 2;

            const catPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            catPath.setAttribute('d', describeArcRing(R_CENTER, R_TIER1, catStartAngle, catEndAngle));
            catPath.setAttribute('fill', cat.color);
            catPath.setAttribute('stroke', '#110d0a');
            catPath.setAttribute('stroke-width', '1.5');
            g.appendChild(catPath);

            const [cx, cy] = polarToCart(0, 0, (R_CENTER + R_TIER1) / 2, catMidAngle);
            const catText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            catText.setAttribute('x', cx); catText.setAttribute('y', cy);
            catText.setAttribute('text-anchor', 'middle'); catText.setAttribute('dominant-baseline', 'central');
            catText.setAttribute('font-size', '13'); catText.setAttribute('font-weight', 'bold');
            catText.setAttribute('fill', '#000');
            
            let textRot = (catMidAngle * 180 / Math.PI);
            if (catMidAngle > 0 && catMidAngle < Math.PI) textRot -= 180;
            catText.setAttribute('transform', `rotate(${textRot}, ${cx}, ${cy})`);
            catText.style.pointerEvents = 'none';
            catText.textContent = cat.name;
            g.appendChild(catText);

            cat.subs.forEach(sub => {
                let totalSubDescs = sub.descriptors.length;
                const subStartAngle = runningDescriptorCount * anglePerDescriptor - Math.PI/2;
                const subEndAngle = subStartAngle + (totalSubDescs * anglePerDescriptor);
                const subMidAngle = subStartAngle + (subEndAngle - subStartAngle) / 2;

                const subPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                subPath.setAttribute('d', describeArcRing(R_TIER1, R_TIER2, subStartAngle, subEndAngle));
                subPath.setAttribute('fill', sub.color);
                subPath.setAttribute('stroke', '#110d0a');
                subPath.setAttribute('stroke-width', '1.2');
                g.appendChild(subPath);

                const [sx, sy] = polarToCart(0, 0, (R_TIER1 + R_TIER2) / 2, subMidAngle);
                const subText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                subText.setAttribute('x', sx); subText.setAttribute('y', sy);
                subText.setAttribute('text-anchor', 'middle'); subText.setAttribute('dominant-baseline', 'central');
                subText.setAttribute('font-size', '11');
                subText.setAttribute('fill', '#110d0a');
                
                let sTextRot = (subMidAngle * 180 / Math.PI);
                if (subMidAngle > 0 && subMidAngle < Math.PI) sTextRot -= 180;
                subText.setAttribute('transform', `rotate(${sTextRot}, ${sx}, ${sy})`);
                subText.style.pointerEvents = 'none';
                subText.textContent = sub.name !== cat.name ? sub.name : "";
                g.appendChild(subText);

                sub.descriptors.forEach(desc => {
                    const descStartAngle = runningDescriptorCount * anglePerDescriptor - Math.PI/2;
                    const descEndAngle = descStartAngle + anglePerDescriptor;
                    const descMidAngle = descStartAngle + anglePerDescriptor / 2;

                    const descPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    const fillHex = generateSegmentColor(descMidAngle);
                    descPath.setAttribute('d', describeArcRing(R_TIER2, R_TIER3, descStartAngle, descEndAngle));
                    descPath.setAttribute('fill', fillHex);
                    descPath.setAttribute('stroke', '#110d0a');
                    descPath.setAttribute('stroke-width', '0.8');
                    descPath.setAttribute('class', 'desc-seg');
                    descPath.setAttribute('cursor', 'pointer');
                    
                    descPath.addEventListener('click', () => showDetailPanel(desc, cat.name, div.association));
                    g.appendChild(descPath);

                    const [dx, dy] = polarToCart(0, 0, (R_TIER2 + R_TIER3) / 2, descMidAngle);
                    const descText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                    descText.setAttribute('x', dx); descText.setAttribute('y', dy);
                    descText.setAttribute('text-anchor', 'middle'); descText.setAttribute('dominant-baseline', 'central');
                    
                    descText.setAttribute('font-size', '16');
                    
                    let dTextRot = (descMidAngle * 180 / Math.PI);
                    
                    if (descMidAngle > 0 && descMidAngle < Math.PI) {
                        dTextRot -= 180;
                    }
                    
                    descText.setAttribute('transform', `rotate(${dTextRot}, ${dx}, ${dy})`);
                    
                    descText.style.pointerEvents = 'none';
                    descText.textContent = desc;
                    g.appendChild(descText);

                    runningDescriptorCount++;
                });
            });
        });
    });

    const hub = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    hub.setAttribute('cx', '0');
    hub.setAttribute('cy', '0'); 
    hub.setAttribute('r', R_CENTER);
    hub.setAttribute('fill', '#26190e'); hub.setAttribute('stroke', '#c9a96e'); hub.setAttribute('stroke-width', '3');
    g.appendChild(hub);

    const hubText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    hubText.setAttribute('x', '0'); hubText.setAttribute('y', '5');
    hubText.setAttribute('text-anchor', 'middle'); hubText.setAttribute('dominant-baseline', 'central');
    hubText.setAttribute('font-size', '65'); hubText.setAttribute('fill', '#e8c97e');
    hubText.setAttribute('font-family', 'Georgia, serif'); hubText.setAttribute('font-weight', 'bold');
    hubText.textContent = 'B';
    g.appendChild(hubText);

    svg.appendChild(g);
}

function showDetailPanel(name, category, association) {
    const lookup = DESCRIPTIONS[name];
    const isPositive = association.toLowerCase().includes('positive');
    const assocColor = isPositive ? '#c9a96e' : '#a63c3c';

    if (!lookup) {
        detail.innerHTML = `
            <div class="association-tag" style="color:${assocColor}">${association}</div>
            <h2>${name}</h2>
            <div class="category-tag">${category}</div>
            <div class="section-title">Sensory Classification</div>
            <div class="body-text">Distillation data point for <span class='highlight'>${name}</span> mapping underway. Volatile threshold properties register across macro group partitions.</div>
        `;
        return;
    }

    detail.innerHTML = `
        <div class="association-tag" style="color:${assocColor}">${association}</div>
        <h2>${name}</h2>
        <div class="category-tag">${category}</div>
        
        <div class="section-title">Notable Producer Notes</div>
        <div class="body-text">${lookup.producers}</div>

        <div class="section-title">Sommelier &amp; Mixologist Study Analysis</div>
        <div class="body-text">${lookup.study}</div>

        <div class="section-title">Server &amp; Guest Friendly Context</div>
        <div class="body-text">${lookup.server}</div>
    `;
}

function getAngle(e, rect) {
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return Math.atan2(clientY - cy, clientX - cx);
}

function applyRotation() {
    const g = document.getElementById('wheelG');
    if (g) g.setAttribute('transform', `rotate(${rotation * 180 / Math.PI})`);
}

function momentum() {
    if (!isDragging && Math.abs(velocity) > 0.001) {
        rotation += velocity;
        velocity *= 0.96;
        applyRotation();
        animFrame = requestAnimationFrame(momentum);
    }
}

svg.addEventListener('mousedown', e => {
    if (e.target.classList.contains('desc-seg')) return;
    isDragging = true;
    const rect = svg.getBoundingClientRect();
    lastAngle = getAngle(e, rect);
    lastTime = Date.now();
    velocity = 0;
    if (animFrame) cancelAnimationFrame(animFrame);
    svg.style.cursor = 'grabbing';
});

window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const rect = svg.getBoundingClientRect();
    const angle = getAngle(e, rect);
    const delta = angle - lastAngle;
    const now = Date.now();
    velocity = delta / (Math.max(1, now - lastTime)) * 16;
    rotation += delta;
    lastAngle = angle;
    lastTime = now;
    applyRotation();
});

window.addEventListener('mouseup', () => {
    if (!isDragging) return;
    isDragging = false;
    svg.style.cursor = 'grab';
    animFrame = requestAnimationFrame(momentum);
});

svg.addEventListener('touchstart', e => {
    const isDesc = e.target.classList.contains('desc-seg');
    if (isDesc) return;
    e.preventDefault();
    isDragging = true;
    const rect = svg.getBoundingClientRect();
    lastAngle = getAngle(e, rect);
    lastTime = Date.now();
    velocity = 0;
    if (animFrame) cancelAnimationFrame(animFrame);
}, { passive: false });

svg.addEventListener('touchmove', e => {
    if (!isDragging) return;
    e.preventDefault();
    const rect = svg.getBoundingClientRect();
    const angle = getAngle(e, rect);
    const delta = angle - lastAngle;
    const now = Date.now();
    velocity = delta / (Math.max(1, now - lastTime)) * 16;
    rotation += delta;
    lastAngle = angle;
    lastTime = now;
    applyRotation();
}, { passive: false });

svg.addEventListener('touchend', () => {
    isDragging = false;
    animFrame = requestAnimationFrame(momentum);
});

buildWheelGeometry();
</script>
