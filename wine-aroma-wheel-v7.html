<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wine Aroma & Flavor Wheel — Mark Lenington</title>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root,[data-theme="light"]{--bg:#faf8f3;--text:#2b251d;--muted:#857966;--line:#e2dacb;--panel:#fff;--accent:#8a5a2a;--gold:#a87f3d;--sep:#faf8f3;--hub:#fffdf8;--hub-text:#6b573a;--badge-bg:#f4eee2;--badge-line:#d8cdb8;--shadow:0 8px 30px rgba(80,60,30,.14);}
[data-theme="dark"]{--bg:#16130e;--text:#e9e2d4;--muted:#9a8d78;--line:#393226;--panel:#1e1a14;--accent:#c9a96e;--gold:#d4b276;--sep:#16130e;--hub:#211c14;--hub-text:#d8c294;--badge-bg:#2a241a;--badge-line:#4a4030;--shadow:0 10px 34px rgba(0,0,0,.55);}
html{background:var(--bg);}
body{font-family:Georgia,'Times New Roman',serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;transition:background .25s,color .25s;}

/* Dashboard Bar for Ambassadors */
#ambassadorDash { display:none; width:100%; max-width:1100px; padding: 0.6rem 1rem; background: var(--badge-bg); border: 1px solid var(--gold); border-radius: 8px; margin: 1rem auto 0.5rem; text-align: center; font-size: 0.9rem; }
#ambassadorDash input { background:transparent; border:none; color:var(--accent); font-family:monospace; font-size:0.95rem; width: 280px; text-align: center; }
#ambassadorDash button { background: var(--gold); color: #fff; border: none; border-radius: 4px; padding: 0.2rem 0.6rem; cursor: pointer; font-size: 0.8rem; font-weight: bold; margin-left: 0.5rem; }

.topbar{width:100%;max-width:1100px;display:flex;justify-content:flex-end;gap:.5rem;padding:.7rem 1rem 0;}
.topbar button{background:none;border:1px solid var(--line);color:var(--muted);font-family:inherit;font-size:.75rem;border-radius:6px;padding:.35rem .7rem;cursor:pointer;}
.topbar button:hover{color:var(--text);border-color:var(--muted);}
h1{font-size:1.4rem;font-weight:400;letter-spacing:.04em;padding:.2rem 1rem .15rem;text-align:center;}
.byline{font-size:.78rem;color:var(--muted);text-align:center;margin-bottom:.2rem;}
.byline em{color:var(--accent);font-style:italic;}
.spin-hint{font-size:.72rem;color:var(--muted);text-align:center;margin-bottom:.55rem;}
.controls{display:flex;align-items:center;gap:.55rem;flex-wrap:wrap;justify-content:center;border:1px solid var(--line);border-radius:8px;padding:.4rem .9rem;margin-bottom:1rem;max-width:96vw;background:var(--panel);}
.controls .ctl-label{font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.controls button{background:none;border:1px solid var(--line);color:var(--text);font-family:inherit;font-size:.9rem;line-height:1;border-radius:6px;padding:.32rem .65rem;cursor:pointer;min-width:2.1rem;min-height:2.1rem;}
.controls button:hover{border-color:var(--gold);color:var(--accent);}
.controls button:focus-visible{outline:2px solid var(--gold);outline-offset:1px;}
.controls input[type=range]{width:150px;accent-color:var(--gold);cursor:pointer;}
.size-ctl{display:flex;align-items:center;gap:.55rem;}
.view-toggle{display:flex;border:1px solid var(--line);border-radius:6px;overflow:hidden;}
.view-toggle button{border:none;border-radius:0;min-width:3.4rem;}
.view-toggle button.active{background:var(--badge-bg);color:var(--accent);font-weight:bold;}

/* Layout and Lock Overlays */
.layout{display:flex;gap:0;width:100%;max-width:1180px;align-items:flex-start;padding:0 1rem 2.5rem;justify-content:center; position:relative;}
.wheel-wrap{flex:0 0 auto;display:flex;justify-content:center;}
#svgContainer { position: relative; line-height: 0; }

/* -------------------------------------------
   GUEST FOG OVERLAYS (WHEEL & LIST)
--------------------------------------------- */
#fogOverlay, #listFogOverlay { display: none; }

/* Show Wheel Fog ONLY when body has is-guest AND view is wheel */
body.is-guest[data-view="wheel"] #fogOverlay { display: block; }

/* Show List Fog ONLY when body has is-guest AND view is list */
body.is-guest[data-view="list"] #listFogOverlay { display: block; }

/* Hide all fogs if heavily locked */
body.locked #fogOverlay, body.locked #listFogOverlay { display: none !important; }

/* The Wheel Fog (Wedge cut-out) */
#fogOverlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  border-radius: 50%;
  backdrop-filter: blur(6px) grayscale(0.3);
  -webkit-backdrop-filter: blur(6px) grayscale(0.3);
  background: rgba(250, 248, 243, 0.45);
  clip-path: polygon(100% -20%, -20% -20%, -20% 120%, 100% 120%, 100% 70%, 50% 50%, 100% 30%);
  pointer-events: none; z-index: 10; transition: opacity 0.3s;
}
[data-theme="dark"] #fogOverlay { background: rgba(22, 19, 14, 0.55); }

/* The List Fog (Fixed to screen, gradient reading slit) */
#listFogOverlay {
  position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
  backdrop-filter: blur(8px) grayscale(0.3);
  -webkit-backdrop-filter: blur(8px) grayscale(0.3);
  background: rgba(250, 248, 243, 0.55);
  z-index: 50; /* Needs to be above the list but below the panel/lock */
  pointer-events: none; /* Crucial: Allows scrolling through the fog! */
  transition: opacity 0.3s;
  /* Leaves the top ~250px completely clear (title + search bar), then fades to heavy blur */
  -webkit-mask: linear-gradient(to bottom, transparent 0px, transparent 250px, black 320px, black 100%);
  mask: linear-gradient(to bottom, transparent 0px, transparent 250px, black 320px, black 100%);
}
[data-theme="dark"] #listFogOverlay { background: rgba(22, 19, 14, 0.65); }

/* The Paywall Overlay */
#lockOverlay {
  display: none; position: absolute; top: -1rem; left: 0; right: 0; bottom: 0;
  background: rgba(250, 248, 243, 0.95); z-index: 100;
  justify-content: center; align-items: center; flex-direction: column;
  text-align: center; padding: 2rem; border-radius: 12px; box-shadow: var(--shadow);
}
[data-theme="dark"] #lockOverlay { background: rgba(22, 19, 14, 0.95); }
#lockOverlay h2 { font-size: 1.8rem; color: var(--accent); margin-bottom: 0.8rem; }
#lockOverlay p { font-size: 1.05rem; margin-bottom: 1.2rem; color: var(--text); max-width: 450px; line-height: 1.5; }
#lockOverlay button.primary-btn {
  background: var(--accent); color: #fff; border: 1px solid var(--gold);
  padding: 0.85rem 1.8rem; font-size: 1.1rem; border-radius: 8px; cursor: pointer;
  font-family: inherit; font-weight: bold; letter-spacing: 0.05em; transition: background 0.2s;
}
#lockOverlay button.primary-btn:hover { background: var(--gold); }
#googleLoginBtn { background: #4285F4; color: #fff; border: none; padding: 0.85rem 1.8rem; font-size: 1.1rem; border-radius: 8px; cursor: pointer; font-family: inherit; font-weight: bold; }

/* Locked States */
.locked #svgContainer { filter: blur(3px) grayscale(0.8); pointer-events: none; }
.locked #listView { opacity: 0.5; pointer-events: none; filter: blur(2px) grayscale(0.8); }
.locked .detail-panel { opacity: 0.5; pointer-events: none; }

#wheelSvg{cursor:grab;user-select:none;touch-action:none;filter:drop-shadow(var(--shadow));}
#wheelSvg:active{cursor:grabbing;}
#wheelSvg .cell{stroke:var(--sep);stroke-width:1.5;}
#wheelSvg .desc-seg{cursor:pointer;transition:filter .15s;}
#wheelSvg .desc-seg:hover{filter:brightness(1.12) saturate(1.05);}
#wheelSvg .desc-seg.selected{stroke:var(--gold);stroke-width:2.4;}
#wheelSvg .hub{fill:var(--hub);stroke:var(--gold);stroke-width:1.4;}
#wheelSvg .hub-text{fill:var(--hub-text);}
#wheelSvg .rim{fill:none;stroke:var(--line);stroke-width:1;}
@media (prefers-reduced-motion:reduce){#wheelSvg .desc-seg{transition:none;}}

#listView{position: relative; display:none; flex:0 1 auto; width:min(720px,94vw); transition: opacity 0.3s, filter 0.3s;}
#listView.active{display:block;}
#listSearch{width:100%;padding:.55rem .85rem;font-family:inherit;font-size:.92rem;background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--text);margin-bottom:1rem;}
#listSearch:focus{outline:none;border-color:var(--gold);}
.cat-block{margin-bottom:1rem;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:.7rem .9rem;}
.cat-head{display:flex;align-items:center;gap:.45rem;font-size:.74rem;font-weight:bold;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;}
.cat-dot{width:.7rem;height:.7rem;border-radius:3px;flex:0 0 auto;}
.sub-group{margin-bottom:.5rem;}
.sub-label{font-size:.64rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);opacity:.8;margin-bottom:.3rem;}
.chip-row{display:flex;flex-wrap:wrap;gap:.4rem;}
.list-chip{font-size:.82rem;font-family:inherit;background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:.32rem .62rem;cursor:pointer;color:var(--text);}
.list-chip:hover{border-color:var(--gold);color:var(--accent);}
.list-chip:focus-visible{outline:2px solid var(--gold);outline-offset:1px;}
.list-chip.selected{border-color:var(--gold);background:var(--badge-bg);color:var(--accent);font-weight:bold;}
#noResults{display:none;color:var(--muted);font-style:italic;font-size:.88rem;padding:.4rem 0;}

.detail-panel{flex:1;min-width:280px;max-width:380px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:1.3rem 1.5rem;min-height:360px;margin-left:1.4rem; transition: opacity 0.3s; z-index:60; position:relative;}
.panel-header{display:flex;align-items:center;justify-content:space-between;gap:.6rem;cursor:grab;touch-action:none;user-select:none;-webkit-user-select:none;margin:-1.3rem -1.5rem 1rem;padding:.5rem .9rem .45rem;border-bottom:1px solid var(--line);border-radius:9px 9px 0 0;}
.panel-header:active{cursor:grabbing;}
.panel-header .grip-title{font-size:.7rem;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);}
.panel-header .grip-dots{color:var(--line);letter-spacing:2px;margin-right:.4rem;}
.panel-header button{background:none;border:1px solid var(--line);color:var(--text);font-family:inherit;font-size:.66rem;border-radius:5px;padding:.22rem .5rem;cursor:pointer;display:none;}
.panel-header button:hover{border-color:var(--gold);color:var(--accent);}
.detail-panel.floating{position:fixed;z-index:60;margin:0;width:min(380px,92vw);max-height:80vh;overflow-y:auto;box-shadow:var(--shadow);border-color:var(--gold);}
.detail-panel.floating .panel-header{position:sticky;top:0;z-index:2;background:var(--panel);}
.detail-panel.floating .panel-header button{display:inline-block;}
.detail-panel h2{font-size:1.3rem;margin-bottom:.15rem;font-weight:400;font-style:italic;color:var(--accent);}
.detail-panel h2 a{color:inherit;text-decoration:none;border-bottom:1px dotted var(--gold);}
.detail-panel h2 a:hover,.detail-panel h2 a:focus-visible{border-bottom-style:solid;color:var(--gold);outline:none;}
.wiki-mark{font-size:.6em;margin-left:.28rem;font-style:normal;color:var(--gold);vertical-align:super;}
.detail-panel .category-tag{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:.75rem;}
.section-title{font-size:.66rem;color:var(--accent);text-transform:uppercase;letter-spacing:.06em;margin:.85rem 0 .25rem;font-weight:bold;border-bottom:1px solid var(--line);padding-bottom:2px;}
.body-text{font-size:.85rem;line-height:1.65;color:var(--text);}
.flag-note{font-size:.74rem;color:var(--gold);background:var(--badge-bg);border:1px solid var(--gold);border-radius:6px;padding:.5rem .7rem;margin-top:.6rem;line-height:1.5;}
.grid-list{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.3rem;}
.grid-badge{font-size:.74rem;background:var(--badge-bg);border:1px solid var(--gold);padding:.18rem .5rem;border-radius:4px;}
.placeholder{color:var(--muted);font-size:.95rem;margin-top:2.5rem;text-align:center;font-style:italic;}
@media(max-width:800px){.layout{flex-direction:column;align-items:center;}.detail-panel{margin-left:0;margin-top:1rem;width:100%;max-width:95vw;}h1{font-size:1.15rem;}}

/* v8 deploy: selection lockdown — wheel spin uses pointer events, unaffected */
body{user-select:none;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;}
input,textarea{user-select:text;-webkit-user-select:text;-moz-user-select:text;}
</style>
</head>
<body class="is-guest" data-view="wheel">

<div id="listFogOverlay"></div> 

<div class="topbar">
  <button id="langBtn" type="button">ES</button>
  <button id="themeBtn" type="button">☾</button>
</div>

<div id="ambassadorDash">
    <strong>Ambassador Status:</strong> <span id="dashRefCounts">0 Referrals</span> &nbsp;|&nbsp; 
    <strong>Share Link:</strong> <input type="text" id="dashRefLink" readonly />
    <button onclick="navigator.clipboard.writeText(document.getElementById('dashRefLink').value); alert('Referral Link Copied!');">Copy</button>
</div>

<h1 id="h1title">Wine Aroma & Flavor Wheel</h1>
<div class="byline" id="byline"></div>
<div class="spin-hint" id="spinHint"></div>
<div class="controls">
  <span class="view-toggle" role="group" aria-label="View mode">
    <button id="viewWheel" type="button" class="active">Wheel</button>
    <button id="viewList" type="button">List</button>
  </span>
  <span class="size-ctl" id="sizeCtl">
    <span class="ctl-label" id="sizeLabel">Wheel size</span>
    <button id="zoomOut" type="button" aria-label="Shrink">−</button>
    <input type="range" id="zoomSlider" min="280" max="1000" step="10" value="560" aria-label="Wheel size">
    <button id="zoomIn" type="button" aria-label="Enlarge">+</button>
    <button id="zoomReset" type="button">Reset</button>
  </span>
</div>
<div class="layout">
  
  <div id="lockOverlay">
    <h2 id="lockTitle"></h2>
    <p id="lockP1"></p>
    <p id="lockP2"></p>
    
    <div id="guestActions" style="display:none; margin-top: 1rem;">
        <button id="googleLoginBtn">Sign in with Google</button>
    </div>

    <div id="ambassadorActions" style="display:none; margin-top: 1rem;">
        <button type="button" class="primary-btn" id="lockBtn" onclick="window.location.href='https://example.com/checkout'">Upgrade to Premium</button>
        <div style="margin-top: 2rem; border-top: 1px solid var(--line); padding-top: 1.5rem;">
          <p id="lockAdPrompt" style="font-size: 0.9rem; margin-bottom: 0.8rem; color: var(--muted);"></p>
          <button type="button" class="primary-btn" id="watchAdBtn" style="background: var(--badge-bg); color: var(--accent); border-color: var(--gold);"></button>
        </div>
    </div>
  </div>

  <div id="adOverlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(22, 19, 14, 0.98); z-index:200; flex-direction:column; align-items:center; justify-content:center; color:#e9e2d4; padding: 2rem; text-align: center; backdrop-filter: blur(10px);">
    <p id="adSponsorHeading" style="text-transform:uppercase; letter-spacing:0.1em; font-size:0.8rem; color:var(--muted); margin-bottom:0.5rem;"></p>
    <h3 id="adSponsorName" style="color:var(--gold); margin-bottom:1.5rem; font-size:2.2rem; font-weight:normal; font-style:italic;"></h3>
    <div id="adContent" style="margin-bottom:2.5rem; font-size:1.15rem; max-width:600px; line-height:1.6;"></div>
    
    <div id="adTimer" style="font-size:1.1rem; margin-bottom:1rem; color:var(--muted);"><span id="adTimerText"></span> <span id="adSeconds" style="color:#fff; font-weight:bold;">15</span>s...</div>
    <button id="claimAdBtn" style="display:none; padding:1rem 2rem; font-size:1.2rem; background:var(--gold); color:#16130e; border:none; border-radius:8px; cursor:pointer; font-weight:bold; font-family:inherit;"></button>
  </div>

  <div class="wheel-wrap" id="wheelWrap">
    <div id="svgContainer">
        <div id="fogOverlay"></div>
        <svg id="wheelSvg" viewBox="-320 -320 640 640" width="560" height="560" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>
  
  <div id="listView">
    <input id="listSearch" type="search" aria-label="Search">
    <div id="listBody"></div>
    <div id="noResults"></div>
  </div>
  
  <div class="detail-panel" id="detailPanel">
    <div class="panel-header" id="panelGrip">
      <span class="grip-title"><span class="grip-dots">⠿</span><span id="gripLabel">Notes</span></span>
      <button id="panelDock" type="button">⤺ Dock</button>
    </div>
    <div id="detailContent"></div>
  </div>
</div>
